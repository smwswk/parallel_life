<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平行人生</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #0e0e0b;
      --bg-card: #17160f;
      --border: #2d2a20;
      --text: #d8d2c3;
      --text-dim: #8d8574;
      --accent: #d7b46a;
      --accent-glow: rgba(215, 180, 106, 0.14);
      --route-a: #6FA66A;
      --route-b: #E74C3C;
      --route-c: #2ECC71;
      --route-d: #9B59B6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
    }

    /* ===== Canvas背景 ===== */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== 场景 ===== */
    .scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      min-height: 100dvh;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      padding: 20px;
    }
    .scene.active {
      opacity: 1;
      pointer-events: none;
    }
    .scene.active .dialogue-box,
    .scene.active #intro-btn-wrap,
    .scene.active .card,
    .scene.active .select-container,
    .scene.active .game-shell {
      pointer-events: auto;
    }

    /* ===== 打字机 ===== */
    .dialogue-box {
      background: rgba(17, 24, 32, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 36px;
      max-width: 520px;
      width: 90%;
      position: relative;
      z-index: 4;
      margin-top: 20px;
    }
    .dialogue-box p {
      font-size: 1.05rem;
      line-height: 1.9;
      min-height: 2em;
      color: var(--text);
    }
    .cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--accent);
      margin-left: 3px;
      animation: blink-cursor 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ===== 按钮 ===== */
    .btn {
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      font-weight: 500;
    }
    .btn-primary:hover {
      background: #e0c37e;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }
    .btn-glow {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }
    .btn-glow::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(215,180,106,0.12), transparent);
      transition: left 0.6s;
      pointer-events: none;
    }
    .btn-glow:hover::before {
      left: 100%;
    }
    .btn-glow:hover {
      border-color: #e0c37e;
      color: #e0c37e;
    }
    .btn-choice {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 18px 24px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .btn-choice:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      background: rgba(215, 180, 106, 0.05);
    }
    .choice-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .choice-text {
      line-height: 1.4;
    }
    .choice-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ===== 试玩关卡 ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      max-width: 520px;
      width: 90%;
      position: relative;
      z-index: 2;
    }
    .scene-visual {
      height: 100px;
      background: linear-gradient(180deg, #15130d 0%, #0e0e0b 100%);
      border-radius: 12px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .scene-visual .window-glow {
      position: absolute;
      width: 60px; height: 80px;
      background: rgba(215, 180, 106, 0.1);
      border-radius: 4px;
      top: 10px; right: 20px;
      border: 1px solid rgba(215, 180, 106, 0.2);
      pointer-events: none;
    }
    .scene-visual .desk-line {
      position: absolute;
      bottom: 20px; left: 10%; right: 10%;
      height: 2px;
      background: var(--border);
    }
    .scene-visual .laptop {
      position: absolute;
      bottom: 22px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 28px;
      background: var(--border);
      border-radius: 2px 2px 0 0;
    }
    .scene-visual .laptop::after {
      content: '';
      position: absolute;
      bottom: -4px; left: -5px;
      width: 50px; height: 4px;
      background: var(--border);
      border-radius: 0 0 2px 2px;
    }
    .time-tag {
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .card h2 {
      font-size: 1.3rem;
      font-weight: 400;
      color: #e0ecff;
      margin-bottom: 12px;
    }
    .card-desc {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 24px;
    }
    .choices-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 时间线 */
    .timeline {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .timeline-node {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
      position: relative;
    }
    .timeline-node::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 28px;
      width: 1.5px;
      height: calc(100% + 4px);
      background: var(--border);
    }
    .timeline-node:last-child::before {
      display: none;
    }
    .timeline-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--accent);
      flex-shrink: 0;
      z-index: 1;
      font-weight: 600;
    }
    .timeline-body h4 {
      font-size: 0.85rem;
      color: #e0ecff;
      margin-bottom: 3px;
      font-weight: 500;
    }
    .timeline-body p {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .hint-box {
      background: rgba(215, 180, 106, 0.06);
      border: 1px solid rgba(215, 180, 106, 0.15);
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
    }
    .hint-box p {
      font-size: 0.85rem;
      color: var(--accent);
      line-height: 1.6;
    }

    /* ===== 职业选择 ===== */
    .select-container {
      max-width: 520px;
      width: 90%;
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .select-container h2 {
      font-size: 1.8rem;
      font-weight: 300;
      color: #e0ecff;
      margin-bottom: 6px;
    }
    .select-container .sub {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .career-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .career-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 20px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .career-card:hover {
      border-color: var(--text-dim);
      transform: translateY(-3px);
    }
    .career-card.selected {
      border-color: var(--accent);
      background: rgba(215, 180, 106, 0.06);
      box-shadow: 0 0 20px rgba(215, 180, 106, 0.1);
    }
    .career-card .c-icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
      transition: transform 0.3s;
    }
    .career-card:hover .c-icon {
      transform: scale(1.1);
    }
    .career-card .c-name {
      font-size: 0.82rem;
      color: var(--text);
    }
    /* ===== 主可视化 ===== */
    #scene-main {
      overflow: hidden;
      justify-content: flex-start;
      padding: 8px 10px;
    }
    .game-shell {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 2;
      padding: 4px 0 8px;
      max-height: calc(100dvh - 16px);
    }
    .game-shell.impact-burst {
      animation: screen-impact 0.5s cubic-bezier(.16, .84, .28, 1) both;
    }
    .impact-flash {
      display: none;
    }
    .game-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
      flex-shrink: 0;
    }
    .topbar-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(17, 24, 32, 0.86);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .sound-toggle.active {
      color: #0e0e0b;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(215, 180, 106, 0.18);
    }
    .game-title {
      min-width: 0;
      text-align: center;
    }
    .game-title { display: none; }
    .stat-grid {
      display: none;
    }
    .stat-card {
      flex: 1;
      min-width: 0;
      background: rgba(17, 24, 32, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 2px;
      text-align: center;
      transition: border-color 0.25s ease;
    }
    .stat-card:hover { border-color: var(--text-dim); }
    .stat-icon {
      font-size: 0.9rem;
      line-height: 1;
      margin-bottom: 2px;
    }
    .stat-value-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 2px;
      margin-bottom: 3px;
    }
    .stat-value {
      color: #e0ecff;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      color: var(--text-dim);
      font-size: 0.55rem;
      line-height: 1;
    }
    .stat-track {
      height: 2px;
      border-radius: 999px;
      background: #192331;
      overflow: hidden;
      margin: 0 auto;
      max-width: 36px;
    }
    .stat-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.35s ease;
    }
    .game-stage {
      background: rgba(17, 24, 32, 0.94);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .battle-panel {
      position: relative;
      margin-top: 4px;
      padding: 4px 0;
    }
    .battle-panel.clash {
      animation: clash-shake 0.58s cubic-bezier(.2, .9, .16, 1) both;
    }
    .duel-board {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .duel-side {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .duel-head {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--text-dim);
      font-size: 0.58rem;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .duel-head span:last-child {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      font-size: 0.6rem;
    }
    .duel-meter {
      flex: 1;
      height: 4px;
      border-radius: 999px;
      background: #17160f;
      overflow: hidden;
      min-width: 24px;
    }
    .duel-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.45s cubic-bezier(.2,.9,.2,1);
    }
    .battle-panel.clash .duel-fill {
      animation: bar-flash 0.58s ease both;
    }
    .duel-vs {
      color: var(--text-dim);
      font-size: 0.55rem;
      flex-shrink: 0;
      padding: 0 2px;
    }
    .duel-log {
      display: none;
    }
    .battle-effects {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .damage-float {
      position: absolute;
      top: 22px;
      right: 24px;
      color: #ff6b6b;
      font-size: 1.25rem;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
      animation: damage-float 1.05s cubic-bezier(.2, .95, .18, 1) both;
    }
    .damage-float.player {
      left: 24px;
      right: auto;
      color: #d7b46a;
    }
    .damage-float.shock {
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      animation-name: shock-float;
    }
    .game-step {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--accent);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .progress-dots {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .progress-dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: #263548;
    }
    .progress-dot.done { background: #44d07b; }
    .progress-dot.current { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    .game-stage h2 {
      font-size: 1rem;
      line-height: 1.2;
      color: #e0ecff;
      font-weight: 400;
      margin-bottom: 4px;
    }
    .game-stage p {
      display: none;
    }
    .route-context {
      display: none;
    }
    .random-event-card {
      margin-top: 4px;
      border: 1px solid rgba(227, 179, 65, 0.1);
      background: rgba(227, 179, 65, 0.03);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .random-event-card:hover,
    .random-event-card:focus-visible {
      border-color: rgba(227, 179, 65, 0.35);
      background: rgba(227, 179, 65, 0.06);
      outline: none;
    }
    .random-event-card.expanded {
      background: rgba(227, 179, 65, 0.05);
      border-color: rgba(227, 179, 65, 0.2);
    }
    .event-kicker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .event-kicker {
      color: #e3b341;
      font-size: 0.58rem;
      letter-spacing: 0.04em;
    }
    .event-toggle {
      color: #e3b341;
      font-size: 0.65rem;
      line-height: 1;
      transition: transform 0.2s ease;
    }
    .random-event-card.expanded .event-toggle {
      transform: rotate(180deg);
    }
    .event-body {
      display: none;
      color: var(--text);
      font-size: 0.7rem;
      line-height: 1.4;
      margin-top: 4px;
    }
    .event-response-row {
      display: none;
      gap: 3px;
      margin-top: 4px;
    }
    .event-response-btn {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(227, 179, 65, 0.15);
      background: rgba(14, 14, 11, 0.4);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 3px 4px;
      font: inherit;
      font-size: 0.55rem;
      line-height: 1.1;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .event-response-btn:hover,
    .event-response-btn:focus-visible {
      color: #f0d78a;
      border-color: rgba(227, 179, 65, 0.4);
      outline: none;
    }
    .event-response-btn.active {
      color: #0e0e0b;
      background: #d7b46a;
      border-color: #d7b46a;
      font-weight: 700;
    }
    .event-detail-row {
      display: none;
      align-items: flex-start;
      gap: 5px;
      margin-top: 3px;
    }
    .event-detail-label {
      flex: 0 0 auto;
      color: #e3b341;
      font-size: 0.55rem;
      line-height: 1.5;
    }
    .random-event-card.expanded .event-body,
    .random-event-card.expanded .event-response-row,
    .random-event-card.expanded .event-detail-row {
      display: flex;
    }
    .random-event-card.expanded .event-body {
      display: block;
    }
    .game-choices {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }
    .game-choice {
      width: 100%;
      background: rgba(10, 14, 20, 0.55);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font: inherit;
      transition: all 0.2s ease;
    }
    .game-choice.playable-card {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
      animation: card-rise 0.25s ease both;
    }
    .game-choice:hover {
      border-color: var(--accent);
      background: rgba(215, 180, 106, 0.05);
      transform: translateY(-1px);
    }
    .choice-head {
      display: none;
    }
    .choice-title {
      color: #f1e5c7;
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.25;
    }
    .choice-combat-row {
      display: none;
    }
    .impact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }
    .choice-combat-row {
      display: flex;
      gap: 5px;
      margin-top: 6px;
    }
    .combat-chip {
      flex: 1;
      min-width: 0;
      border-radius: 6px;
      padding: 4px 5px;
      font-size: 0.64rem;
      line-height: 1.1;
      font-weight: 650;
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .card-attack { color: #ffd27a; background: rgba(227, 179, 65, 0.13); }
    .card-guard { color: #d7b46a; background: rgba(215, 180, 106, 0.12); }
    .card-recoil { color: #ff8c8c; background: rgba(255, 107, 107, 0.11); }
    .impact-pill {
      border-radius: 999px;
      background: #182230;
      color: var(--text-dim);
      padding: 3px 7px;
      font-size: 0.66rem;
      font-variant-numeric: tabular-nums;
    }
    .pressure-pill {
      border-radius: 999px;
      background: rgba(215, 180, 106, 0.1);
      color: #d7b46a;
      padding: 3px 7px;
      font-size: 0.66rem;
      font-variant-numeric: tabular-nums;
    }
    .impact-pill.up { color: #44d07b; background: rgba(68, 208, 123, 0.12); }
    .impact-pill.down { color: #ff6b6b; background: rgba(255, 107, 107, 0.12); }
    @keyframes clash-shake {
      0% { transform: translateX(0); }
      12% { transform: translateX(-8px) rotate(-0.4deg); }
      28% { transform: translateX(7px) rotate(0.35deg); }
      45% { transform: translateX(-4px) rotate(-0.2deg); }
      68% { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }
    @keyframes bar-flash {
      0%, 100% { filter: brightness(1); }
      20% { filter: brightness(2.2) saturate(1.45); }
      55% { filter: brightness(1.65); }
    }
    @keyframes damage-float {
      0% { opacity: 0; transform: translateY(8px) scale(0.85); }
      16% { opacity: 1; transform: translateY(-4px) scale(1.22); }
      100% { opacity: 0; transform: translateY(-42px) scale(0.96); }
    }
    @keyframes shock-float {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px) scale(0.86); }
      18% { opacity: 1; transform: translateX(-50%) translateY(-2px) scale(1.12); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-34px) scale(0.98); }
    }
    @keyframes screen-impact {
      0% { transform: translate3d(0,0,0); filter: brightness(1); }
      16% { transform: translate3d(-3px, 2px, 0) scale(1.006); filter: brightness(1.12); }
      32% { transform: translate3d(3px, -2px, 0) scale(1.002); }
      58% { transform: translate3d(-1px, 1px, 0); }
      100% { transform: translate3d(0,0,0); filter: brightness(1); }
    }
    @keyframes impact-flash {
      0% { opacity: 0; transform: scale(0.98); }
      20% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.04); }
    }
    @keyframes card-rise {
      0% { opacity: 0; transform: translateY(8px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .game-history {
      display: none;
    }
    .game-history.active { display: none; }
    .history-badge {
      display: none;
      font-size: 0.68rem;
      padding-top: 1px;
    }
    .ending-card {
      background: rgba(17, 24, 32, 0.96);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      max-height: calc(100dvh - 60px);
      overflow-y: auto;
    }
    .ending-card h2 {
      font-size: 1.05rem;
      color: #e0ecff;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .ending-card p {
      color: var(--text);
      font-size: 0.78rem;
      line-height: 1.5;
    }
    .ending-parallel {
      margin-top: 10px;
      padding: 8px 0 2px;
      border-top: 1px solid rgba(90, 106, 122, 0.2);
    }
    .parallel-kicker {
      color: #e3b341;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .parallel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .parallel-person {
      display: block;
      color: #eaf3ff;
      font-size: 0.92rem;
      line-height: 1.2;
      font-weight: 600;
    }
    .parallel-role {
      display: block;
      color: var(--text-dim);
      font-size: 0.62rem;
      line-height: 1.3;
      margin-top: 1px;
    }
    .parallel-match {
      flex: 0 0 auto;
      color: #0e0e0b;
      background: #e3b341;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 0.62rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .parallel-body {
      color: var(--text);
      font-size: 0.76rem;
      line-height: 1.5;
    }
    .ending-encouragement {
      color: #eaf3ff;
      font-size: 0.8rem;
      line-height: 1.5;
      margin-top: 6px;
    }
    .parallel-note {
      color: var(--text-dim);
      font-size: 0.62rem;
      line-height: 1.4;
      margin-top: 5px;
    }
    .ending-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }
    .ending-actions .btn {
      padding: 10px 16px;
      font-size: 0.8rem;
      border-radius: 8px;
    }
    .small-note {
      color: var(--text-dim);
      font-size: 0.72rem;
      line-height: 1.45;
      margin-top: 8px;
      min-height: 1em;
    }
    .map-panel {
      background: rgba(17, 24, 32, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .map-panel summary {
      cursor: pointer;
      padding: 8px 12px;
      color: var(--text-dim);
      font-size: 0.7rem;
      list-style: none;
    }
    .map-panel summary::-webkit-details-marker { display: none; }
    .map-panel[open] summary {
      border-bottom: 1px solid var(--border);
    }
    .main-header {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 6px;
      margin-bottom: 8px;
    }
    .main-header h1 {
      font-size: 0.9rem;
      font-weight: 300;
      color: #e0ecff;
    }
    .main-header .legend-row {
      display: flex;
      gap: 10px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.6rem;
      color: var(--text-dim);
    }
    .leg-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    #tree-wrap {
      width: 100%;
      max-width: 1000px;
      height: 280px;
      position: relative;
    }
    #tree-wrap svg {
      width: 100%;
      height: 100%;
    }

    .route-path {
      fill: none;
      stroke-width: 2;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .route-path.real {
      stroke-width: 3.5;
      opacity: 1;
    }
    .route-path.dashed {
      stroke-dasharray: 6 4;
    }
    .route-path:hover {
      opacity: 1;
    }

    .node-card-group {
      cursor: pointer;
    }
    .node-card-group:hover .node-rect {
      filter: brightness(1.3);
      stroke: var(--accent);
    }
    .node-card-group.chosen .node-rect {
      stroke: #e0ecff;
      stroke-width: 2;
      filter: drop-shadow(0 0 8px rgba(215, 180, 106, 0.28));
    }
    .node-rect {
      fill: var(--bg-card);
      stroke: var(--border);
      stroke-width: 1;
      rx: 10;
      transition: all 0.3s;
    }
    .node-pill {
      rx: 4;
    }
    .node-pill-text {
      font-size: 9px;
      fill: var(--text-dim);
      text-anchor: middle;
    }
    .node-icon-text {
      font-size: 20px;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .node-title {
      font-size: 10px;
      fill: var(--text);
      text-anchor: middle;
      font-weight: 500;
      pointer-events: none;
    }
    .node-time {
      font-size: 9px;
      fill: var(--text-dim);
      text-anchor: middle;
      pointer-events: none;
    }

    .start-group {
      cursor: default;
    }
    .start-circle {
      fill: var(--bg);
      stroke: var(--accent);
      stroke-width: 2.5;
    }
    .start-text {
      font-size: 11px;
      fill: var(--text);
      text-anchor: end;
      font-weight: 500;
    }

    .ir-marker {
      cursor: help;
    }
    .ir-text {
      font-size: 8px;
      fill: #e3b341;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .ir-marker:hover + .ir-text,
    .ir-text:hover {
      opacity: 1;
    }

    /* 详情弹窗 */
    .detail-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .detail-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .detail-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 400px;
      max-width: 90vw;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 101;
    }
    .detail-popup.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    .detail-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
    }
    .detail-close:hover { color: #e0ecff; }
    .detail-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .detail-popup h3 {
      font-size: 1.1rem;
      color: #e0ecff;
      margin-bottom: 3px;
      font-weight: 400;
    }
    .detail-time {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .detail-desc {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 16px;
    }
    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .metric {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }
    .metric-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    .metric-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 5px;
      overflow: hidden;
    }
    .metric-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .metric-val {
      font-size: 0.85rem;
      font-weight: 500;
      color: #e0ecff;
    }
    .detail-event {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .detail-event-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .detail-event-text {
      font-size: 0.82rem;
      color: var(--text);
    }
    .detail-open {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.88rem;
      padding: 16px 0;
    }

    /* 雷达图 */
    .radar-area {
      max-width: 420px;
      width: 100%;
      margin: 16px auto 40px;
      text-align: center;
    }
    .radar-area h3 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* 底部 */
    .page-footer {
      text-align: center;
      padding: 6px 0;
      font-size: 0.62rem;
      color: #3a4a5a;
      flex-shrink: 0;
    }

    /* 工具提示 */
    .tip {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.75rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 50;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .scene {
        overflow: hidden;
        justify-content: flex-start;
        padding: 6px 8px;
      }
      #scene-intro {
        justify-content: center;
        padding: 12px;
      }
      #scene-select {
        padding-top: 12px;
        padding-bottom: 20px;
      }
      .select-container {
        width: 100%;
        padding: 0 4px;
      }
      .select-container h2 { font-size: 1.3rem; }
      .select-container .sub { margin-bottom: 14px; font-size: 0.82rem; }
      .career-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .career-card {
        border-radius: 8px;
        padding: 10px 4px;
      }
      .career-card .c-icon {
        font-size: 1.5rem;
        margin-bottom: 4px;
      }
      .career-card .c-name { font-size: 0.72rem; }
      #btn-generate,
      #btn-resume {
        width: 100%;
      }
      .card { padding: 20px; }
      .dialogue-box { padding: 16px 20px; }
      .main-header { flex-direction: column; gap: 6px; align-items: flex-start; }
      .main-header .legend-row { flex-wrap: wrap; }
      #tree-wrap { height: 220px; }
      .detail-popup { width: 92vw; padding: 16px; }
      .game-shell { max-height: calc(100dvh - 12px); gap: 6px; }
      .stat-grid { gap: 4px; }
      .stat-card { padding: 5px 2px; }
      .stat-icon { font-size: 0.85rem; }
      .stat-value { font-size: 0.88rem; }
      .game-stage { padding: 10px 12px; }
      .game-stage h2 { font-size: 0.92rem; }
      .game-choice { padding: 7px 9px; }
      .choice-title { font-size: 0.82rem; }
      .ending-actions { grid-template-columns: 1fr 1fr; gap: 5px; }
      .ending-actions .btn { padding: 8px 12px; font-size: 0.75rem; }
      .ending-card { padding: 12px; }
      .map-panel summary { padding: 6px 10px; font-size: 0.65rem; }
    }

    /* Meta进度条 */
    .meta-level-bar {
      margin-top: 6px;
      padding: 6px 10px;
      background: rgba(17, 24, 32, 0.5);
      border: 1px solid rgba(45, 42, 32, 0.3);
      border-radius: 8px;
    }
    .meta-level-label {
      color: #e0ecff;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .meta-xp-text {
      color: var(--text-dim);
      font-size: 0.6rem;
    }
    .meta-gained {
      color: var(--accent);
      font-size: 0.74rem;
      font-weight: 600;
    }
    .meta-unlock {
      color: #44d07b;
      font-size: 0.68rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .meta-xp-track {
      height: 3px;
      border-radius: 999px;
      background: #192331;
      overflow: hidden;
      margin-top: 2px;
    }
    .meta-xp-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .meta-next-reward {
      color: var(--text-dim);
      font-size: 0.6rem;
      margin-top: 3px;
    }
    .meta-total-stats {
      color: var(--text-dim);
      font-size: 0.58rem;
      margin-top: 2px;
    }

    /* 人生名片弹窗 */
    .card-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 16px;
    }
    .card-overlay.active {
      display: flex;
    }
    .card-container {
      position: relative;
      max-width: 420px;
      width: 100%;
    }
    .card-container img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(215,180,106,0.08);
    }
    .card-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .card-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 职业选择页Meta面板 */
    .meta-panel {
      max-width: 520px;
      width: 90%;
      margin: 18px auto 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- ===== Scene 0: 开场叙事 ===== -->
  <section id="scene-intro" class="scene active">
    <div class="dialogue-box">
      <p id="typewriter"></p><span class="cursor" id="cursor">|</span>
    </div>
    <div style="margin-top: 28px; opacity: 0; transition: opacity 1s;" id="intro-btn-wrap">
      <button class="btn btn-glow" id="btn-enter" onclick="showScene(1)">进入平行人生</button>
    </div>
  </section>

  <!-- ===== Scene 1: 试玩关卡 ===== -->
  <section id="scene-tutorial" class="scene">
    <div class="card" id="tut-card">
      <div class="scene-visual">
        <div class="window-glow"></div>
        <div class="desk-line"></div>
        <div class="laptop"></div>
      </div>
      <div class="time-tag">周五 · 晚上8点</div>
      <h2 id="tut-title">一个普通的周末前夜</h2>
      <p class="card-desc" id="tut-desc">刚结束一周工作。桌上摊着没做完的方案，手机里有朋友发来的聚会邀请。</p>
      <div class="choices-box" id="tut-choices">
        <button class="btn-choice" onclick="tutorialChoice('work')">
          <span class="choice-icon">💻</span>
          <div class="choice-text">
            <div>留下来，把方案做完</div>
            <div class="choice-desc">短期收益，但可能错过些什么</div>
          </div>
        </button>
        <button class="btn-choice" onclick="tutorialChoice('party')">
          <span class="choice-icon">🎉</span>
          <div class="choice-text">
            <div>关掉电脑，去参加聚会</div>
            <div class="choice-desc">放松一下，看看会发生什么</div>
          </div>
        </button>
      </div>
      <div class="timeline" id="tut-result" style="display:none;"></div>
    </div>
  </section>

  <!-- ===== Scene 2: 职业选择 ===== -->
  <section id="scene-select" class="scene">
    <div class="select-container">
      <h2>你是谁？</h2>
      <p class="sub">选择你的起点，生成专属平行人生</p>
      <div class="career-grid" id="career-grid"></div>
      <button class="btn btn-primary" id="btn-generate" onclick="generateLife()" style="opacity: 0.4; pointer-events: none;">
        开始这局人生
      </button>
      <button class="btn btn-glow" id="btn-resume" onclick="restoreGameFromSave()" style="display:none; margin-top: 10px; width: 100%;">
        继续上次人生
      </button>
    </div>
    <div class="meta-panel" id="meta-panel"></div>
  </section>

  <!-- ===== Scene 3: 游戏主循环 ===== -->
  <section id="scene-main" class="scene">
    <div class="game-shell">
      <div class="game-topbar">
        <button class="icon-btn" onclick="backToSelect()" aria-label="返回职业选择">‹</button>
        <div class="game-title">
          <h1>平行人生</h1>
          <p id="game-step-label">选择会改变下一段人生</p>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn sound-toggle active" id="sound-toggle" onclick="toggleAudio()" aria-label="切换声音">♪</button>
          <button class="icon-btn" data-action="restart" onclick="restartGame()" aria-label="重开">↻</button>
        </div>
      </div>

      <div class="stat-grid" id="stat-grid"></div>

      <div class="game-stage" id="game-stage">
        <div class="game-step">
          <span id="game-phase-label">第 1 站</span>
          <div class="progress-dots" id="progress-dots"></div>
        </div>
        <h2 id="game-event-title">选择你的方向</h2>
        <p id="game-event-desc">每一次选择都会改变钱、健康、关系、意义和自由。</p>
        <div class="route-context" id="game-route-context"></div>
        <div class="battle-panel" id="battle-panel"></div>
        <div class="game-choices" id="game-choices"></div>
      </div>

      <div class="ending-card" id="ending-card" style="display:none;"></div>

      <div class="game-history" id="game-history"></div>

      <details class="map-panel" id="map-panel">
        <summary>查看人生地图和资产负债表</summary>
        <div class="main-header">
          <h1>路线地图</h1>
          <div class="legend-row" id="main-legend"></div>
        </div>
        <div id="tree-wrap"></div>
        <div class="radar-area">
          <h3>路线基准对比</h3>
          <div id="radar-chart"></div>
        </div>
      </details>

      <div class="page-footer">
        <button class="btn-glow" data-action="share" style="padding: 8px 16px; font-size: 0.78rem; background: transparent;" onclick="shareGame()">分享本局</button>
        <div class="small-note" id="share-feedback"></div>
      </div>
    </div>
  </section>

  <!-- ===== 弹窗 ===== -->
  <div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
  <div class="detail-popup" id="detail-popup">
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div id="detail-body"></div>
  </div>

  <div class="tip" id="tip"></div>

  <script>
    // ============================================================
    // 配置
    // ============================================================
    const CAREERS = [
      { id: 'architecture', icon: '🏗️', name: '建筑/设计', color: '#6FA66A' },
      { id: 'tech', icon: '💻', name: '互联网/技术', color: '#E74C3C' },
      { id: 'finance', icon: '💰', name: '金融/商务', color: '#2ECC71' },
      { id: 'education', icon: '📚', name: '教育/学术', color: '#9B59B6' },
      { id: 'gov', icon: '🏛️', name: '体制内', color: '#F39C12' },
      { id: 'freelance', icon: '🎨', name: '自由职业', color: '#1ABC9C' }
    ];

    const ICON_MAP = {
      '加班': '💻', '工作': '💻', '方案': '💻', '项目': '🚀', '产品': '🚀',
      '焦虑': '😰', '压力': '😰', '断档': '😰',
      '晋升': '📈', '升职': '📈', '成功': '📈', '合伙人': '📈',

    function expandRouteNodes(route) {
      const orig = route.nodes;
      if (orig.length >= 6) return route;
      const timeLabels = ['3个月后', '6个月后', '1年后', '2年后', '3年后', '10年后'];
      const timeMonths = [3, 6, 12, 24, 36, 120];
      const rawMap = [0, null, 1, null, 2, 3];
      const expanded = [];
      for (let i = 0; i < 6; i++) {
        const rawIdx = rawMap[i];
        if (rawIdx !== null) {
          expanded.push({ ...orig[rawIdx], time_label: timeLabels[i], time_months: timeMonths[i] });
        } else {
          const prev = orig[rawMap[i - 1]];
          const next = orig[rawMap[i + 1]];
          const mid = (a, b) => (a == null || b == null) ? null : Math.round((a + b) / 2);
          const seed = ((route.id || '').charCodeAt(0) || 0) + i * 7;
          const prevT = (prev.title || '').slice(0, 6);
          const nextT = (next.title || '').slice(0, 6);
          const titles = [`${prevT}的延续`, `${prevT}之后`, `从${prevT}到${nextT}`];
          expanded.push({
            time_label: timeLabels[i],
            time_months: timeMonths[i],
            title: titles[seed % titles.length],
            description: `从"${prev.title || ''}"走向"${next.title || ''}"的过渡阶段。惯性在推着你向前，但你仍可以改变方向。`,
            income: mid(prev.income, next.income),
            emotion: mid(prev.emotion, next.emotion),
            health: mid(prev.health, next.health),
            key_event: `过渡：${(prev.key_event || '').slice(0, 10)}...`
          });
        }
      }
      return { ...route, nodes: expanded };
    }

    function computeLevel(xp) {
      for (let i = META_LEVELS.length - 1; i >= 0; i--) {
        if (xp >= META_LEVELS[i].xp) return META_LEVELS[i];
      }
      return META_LEVELS[0];
    }

    function getNextLevel(xp) {
      for (let i = 0; i < META_LEVELS.length; i++) {
        if (xp < META_LEVELS[i].xp) return META_LEVELS[i];
      }
      return null;
    }

      meta.totalGames += 1;
      if (!meta.uniqueEndings.includes(endingTitle)) {
        meta.uniqueEndings.push(endingTitle);
      }

      // 破纪录加分
      if (score === meta.highestScore && meta.totalGames > 1) gained += 1;

      const oldLevel = computeLevel(meta.xp);
      meta.xp += gained;
      const newLevel = computeLevel(meta.xp);

      // 解锁新奖励
      if (newLevel.level > oldLevel.level && newLevel.reward && !meta.unlockedFeatures.includes(newLevel.reward)) {
        meta.unlockedFeatures.push(newLevel.reward);
      }

      saveMetaProgress(meta);
      return { meta, gained, leveledUp: newLevel.level > oldLevel.level, oldLevel, newLevel };
    }

    function generateRelics(state) {
      const candidates = [];
      const stats = state.stats;
      const history = state.history || [];
      const careerId = state.careerId;
      const uniqueRoutes = new Set(history.map(h => h.routeId));

      RELIC_CATALOG.forEach(relic => {
        if (relic.trigger.allCareersRequired) {
          // 需要遍历所有职业——检查 Meta
          const meta = getMetaProgress();
          const allCareerIds = ['architecture', 'tech', 'finance', 'education', 'gov', 'freelance'];
          if (allCareerIds.every(c => meta.completedCareers?.includes?.(c))) {
            candidates.push(relic);
          }
          return;
        }

        // 检查路线条件
        if (relic.trigger.anyRouteId) {
          const hasMatch = relic.trigger.anyRouteId.some(rid => uniqueRoutes.has(rid));
          if (!hasMatch) return;
        }

        // 检查最小步数
        if (relic.trigger.minStep !== undefined && state.currentStep < relic.trigger.minStep) return;

        // 检查路线多样性
        if (relic.trigger.uniqueRoutesMin && uniqueRoutes.size < relic.trigger.uniqueRoutesMin) return;

        // 检查标记
        if (relic.trigger.tagCheck) {
          if (!state.tags) return;
          const allTagsPresent = relic.trigger.tagCheck.every(tag => state.tags[tag]);
          if (!allTagsPresent) return;
        }

        // 检查属性条件
        if (relic.trigger.statCheck) {
          for (const [key, condition] of Object.entries(relic.trigger.statCheck)) {
            const val = stats[key];
            if (condition.min !== undefined && val < condition.min) return;
            if (condition.max !== undefined && val > condition.max) return;
          }
        }

        // 检查职业完成条件
        if (relic.trigger.careersRequired) {
          if (!relic.trigger.careersRequired.includes(careerId)) return;
        }

        candidates.push(relic);
      });

      // 按稀有度加权随机选择 1-3 个
      const rarityWeight = { common: 4, rare: 3, epic: 2, legendary: 1 };
      const seed = state.seed || 1;
      const shuffled = candidates.sort(() => seededRandom(seed + candidates.length) - 0.5);
      const count = Math.min(3, 1 + Math.floor(seededRandom(seed + 77) * 3));
      const selected = [];
      const usedCategories = new Set();

      for (const relic of shuffled) {
        if (selected.length >= count) break;
        if (usedCategories.has(relic.category)) continue;
        // Legendary总是加入
        if (relic.rarity === 'legendary' || Math.random() < rarityWeight[relic.rarity] / 5) {
          selected.push(relic);
          usedCategories.add(relic.category);
        }
      }

      return selected.length ? selected : [candidates[0]]; // 至少一个
    }

    function saveRelics(relics) {
      const meta = getMetaProgress();
      meta.relics = meta.relics || [];
      const existingIds = new Set(meta.relics.map(r => r.id));
      relics.forEach(r => {
        if (!existingIds.has(r.id)) {
          meta.relics.push({ id: r.id, earnedAt: new Date().toISOString() });
          existingIds.add(r.id);
        }
      });
      // 更新完成职业列表
      meta.completedCareers = meta.completedCareers || [];
      if (gameState && !meta.completedCareers.includes(gameState.careerId)) {
        meta.completedCareers.push(gameState.careerId);
      }
      saveMetaProgress(meta);
    }

      const buff = { money: 0, health: 0, relationship: 0, meaning: 0, freedom: 0 };
      if (relic.buff.stat === 'all') {

      } else if (relic.buff.stat && buff.hasOwnProperty(relic.buff.stat)) {
        buff[relic.buff.stat] = relic.buff.value;
      }
      return buff;

    function updateGameTagsAfterChoice(option, routeIndex) {
      if (!gameState) return;
      const route = option.route;
      const node = option.node;

      // 冒过险：选择了创新/高风险路线（路线B通常是高风险）
      if (route.id === 'route_b' || routeIndex === 1) setGameTag('took_risk');

      // 断了退路：从高薪路线跳到了低薪路线
      if (gameState.history.length >= 1) {
        const lastRoute = gameState.history[gameState.history.length - 1];
        const lastIncome = lastRoute.node?.income ?? 0;
        const thisIncome = node.income ?? 0;
        if (lastIncome > 10000 && thisIncome < 5000) setGameTag('burned_bridge');
      }

      // 深耕者：连续3站同一路线
      const lastThreeChoices = gameState.history.slice(-2).concat([{ routeId: route.id }]);
      if (lastThreeChoices.length >= 3 && lastThreeChoices.every(h => h.routeId === route.id)) {
        setGameTag('stayed_loyal');
      }

      // 健康意识：健康值不低于5
      if (gameState.stats.health >= 5) setGameTag('health_aware');

      // 金钱导向：金钱值9+
      if (gameState.stats.money >= 9) setGameTag('money_focused');

      // 关系丰厚：关系值8+
      if (gameState.stats.relationship >= 8) setGameTag('relationship_rich');

      // 意义驱动：意义值8+
      if (gameState.stats.meaning >= 8) setGameTag('meaning_driven');

      if (stats.money >= 8) additions.push('经济宽裕让你有了更多选择空间。');
      if (stats.money <= 2) additions.push('存款在见底，每个选择都带有一份焦虑。');
      if (stats.relationship <= 2) additions.push('身边能理解你的人越来越少。');
      if (stats.relationship >= 8) additions.push('你的关系网络是此刻最大的资产。');
      if (stats.meaning >= 8) additions.push('你对自己在做什么毫不怀疑。');
      if (stats.meaning <= 2) additions.push('你开始怀疑这一切是否值得。');
      if (stats.freedom >= 8) additions.push('你的时间完全属于自己。');
      if (stats.freedom <= 2) additions.push('日程表被塞满，你没有喘息的空间。');
      if (additions.length === 0) return description;
      const count = Math.min(2, additions.length);
      const seed = (gameState?.seed || 1) + (route.id || '').length * 7;
      const picked = [];
      let attempts = 0;
      while (picked.length < count && attempts < 20) {
        const idx = Math.floor(seededRandom(seed + attempts * 31) * additions.length);
        if (!picked.includes(idx)) picked.push(idx);
        attempts++;
      }
      return description + ' ' + picked.map(i => additions[i]).join('');
    }

    function getAudioContext() {
      if (audioCtx) return audioCtx;
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return null;
      audioCtx = new AudioCtor();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.42;
      masterGain.connect(audioCtx.destination);
      return audioCtx;
    }

    function unlockAudio() {
      soundState.unlocked = true;
      const ctx = getAudioContext();
      if (ctx && ctx.state === 'suspended') {
        ctx.resume().catch(e => console.warn('音频解锁失败', e));
      }
      if (soundState.enabled) startMusicLoop();
      updateSoundButton();
      return true;

    function updateSoundButton() {

    }

    function stopMusicLoop() {
      if (musicTimer) clearInterval(musicTimer);
      musicTimer = null;
      soundState.musicPlaying = false;
    }

    function startMusicLoop() {
      if (!soundState.enabled || musicTimer) return;
      soundState.musicPlaying = true;
      playMusicBeat();
      musicTimer = setInterval(playMusicBeat, 520);
    }

    function playTone(freq, duration = 0.12, type = 'sine', gainValue = 0.04, delay = 0) {
      const ctx = getAudioContext();
      if (!ctx || !soundState.enabled || !masterGain) return;
      const start = ctx.currentTime + delay;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(start);
      osc.stop(start + duration + 0.02);
    }

    function playNoise(duration = 0.12, gainValue = 0.08) {
      const ctx = getAudioContext();
      if (!ctx || !soundState.enabled || !masterGain) return;
      const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      src.buffer = buffer;
      gain.gain.value = gainValue;
      src.connect(gain);
      gain.connect(masterGain);
      src.start();
      src.stop(ctx.currentTime + duration);
    }

    function playMusicBeat() {
      if (!soundState.enabled) return;
      const step = soundState.beat % 8;
      const bass = [82.41, 82.41, 98, 110, 82.41, 123.47, 110, 98][step];
      if (step % 2 === 0) playTone(bass, 0.28, 'triangle', 0.026);
      playTone([220, 246.94, 277.18, 329.63][step % 4], 0.09, 'sine', 0.012, 0.08);
      if (step === 0 || step === 4) playTone(55, 0.08, 'sawtooth', 0.032);
      soundState.beat += 1;
    }

    const canvas = document.getElementById('bg-canvas');

    function resizeCanvas() {
      canvas.width = window.innerWidth;

    function initStars() {
      stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height * 0.5,
          size: Math.random() * 1.5 + 0.3,
          twinkle: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.02 + 0.005
        });
      }
    }

    function initWindows() {
      buildings = [];
      windows = [];
      const buildingCount = Math.floor(canvas.width / 40);
      for (let b = 0; b < buildingCount; b++) {
        const bx = b * 40 + Math.random() * 15;
        const by = canvas.height - Math.random() * canvas.height * 0.35 - 20;
        const bw = 25 + Math.random() * 15;
        const bh = canvas.height - by;
        buildings.push({ x: bx, y: by, w: bw, h: bh });
        const floors = Math.floor(bh / 18);
        const cols = Math.floor(bw / 10);
        for (let f = 1; f < floors - 1; f++) {
          for (let c = 0; c < cols; c++) {
            if (Math.random() > 0.4) {
              windows.push({
                x: bx + c * 10 + 2,
                y: by + f * 18 + 3,
                w: 5, h: 8,
                on: Math.random() > 0.2,
                warmth: Math.random() > 0.5 ? 'warm' : 'cool',
                flicker: Math.random() * Math.PI * 2,
                fSpeed: Math.random() * 0.03 + 0.01
              });
            }
          }
        }
      }
    }

    function drawBg() {
      ctx.fillStyle = '#0e0e0b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 星星
      stars.forEach(s => {
        s.twinkle += s.speed;
        const opacity = 0.3 + Math.sin(s.twinkle) * 0.3;
        ctx.fillStyle = `rgba(218, 214, 202, ${opacity * 0.55})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      });

      // 城市轮廓
      ctx.fillStyle = '#060a10';
      buildings.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      });

      // 窗户灯光
      const time = Date.now() * 0.001;
      windows.forEach(w => {
        w.flicker += w.fSpeed;
        const flickerOpacity = w.on ? (0.5 + Math.sin(w.flicker) * 0.2) : 0;
        if (flickerOpacity > 0.05) {
          ctx.fillStyle = w.warmth === 'warm'
            ? `rgba(230, 180, 100, ${flickerOpacity})`
            : `rgba(165, 168, 160, ${flickerOpacity * 0.45})`;
          ctx.fillRect(w.x, w.y, w.w, w.h);
        }
      });

      requestAnimationFrame(drawBg);
    }

    // ============================================================
    // 游戏主循环
    // ============================================================
    function startNewGame(careerId) {
      const career = CAREERS.find(c => c.id === careerId) || CAREERS[0];
      const bonus = getStartStatsBonus();
      // 应用圣遗物buff
      const relicIds = window._selectedRelicIds || [];
      let relicBuff = { money: 0, health: 0, relationship: 0, meaning: 0, freedom: 0 };
      const activeRelics = [];
      relicIds.forEach(rid => {
        const buff = applyRelicBuff(rid);
        Object.keys(buff).forEach(k => { relicBuff[k] += buff[k]; });
        activeRelics.push(rid);
      });

      const baseStats = {};
      Object.keys(BASE_STATS).forEach(key => {
        baseStats[key] = clampStat(BASE_STATS[key] + (bonus[key] || 0) + (relicBuff[key] || 0));
      });

      // 遗物特殊效果
      const hasResolveBoost = relicIds.some(rid => {
        const r = getRelicById(rid);
        return r?.buff?.special === 'resolve_boost' || r?.buff?.special === 'perfect_bonus';
      });

      gameState = {
        careerId,
        careerName: career.name,
        seed: makeSeed(),
        currentStep: 0,
        activeRouteId: null,
        stats: baseStats,
        activeRelics,
        tags: {},
        duel: createInitialDuel(hasResolveBoost),
        eventResponses: {},
        history: [],
        ended: false,
        ending: null,
        startedAt: new Date().toISOString()
      };
      window._selectedRelicIds = null;
      syncWindowState();
      saveGame();
    }

    function createInitialDuel(resolveBoost = false) {
      return {
        resolve: resolveBoost ? 28 : 24,
        maxResolve: resolveBoost ? 28 : 24,
        pressure: 28,
        maxPressure: 28,
        combo: 0,
        lastRound: null
      };
    }

    function ensureDuelState() {
      if (!gameState) return null;
      const base = createInitialDuel();
      gameState.duel = {
        ...base,
        ...(gameState.duel || {})
      };
      gameState.duel.resolve = clampValue(gameState.duel.resolve, 0, gameState.duel.maxResolve || base.maxResolve);
      gameState.duel.pressure = clampValue(gameState.duel.pressure, 0, gameState.duel.maxPressure || base.maxPressure);
      return gameState.duel;
    }

    function clampValue(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getMaxSteps() {
      return Math.max(...routesData.map(route => route.nodes.length));
    }

    function clampStat(value) {
      return Math.max(0, Math.min(10, value));
    }

    function clampDelta(value) {
      return Math.max(-4, Math.min(4, value));
    }

    function signed(value) {
      return value > 0 ? `+${value}` : String(value);
    }

    function makeSeed() {
      return Math.floor(Math.random() * 1000000000);
    }

    function seededRandom(seed) {
      let t = seed + 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }

    function stepRandom(stepIndex, salt = 0) {
      const base = gameState?.seed || 1;
      const routeOffset = gameState?.activeRouteId
        ? gameState.activeRouteId.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0)
        : 0;
      return seededRandom(base + stepIndex * 9973 + salt * 7919 + routeOffset);
    }

    function pickBySeed(items, stepIndex, salt = 0) {
      return items[Math.floor(stepRandom(stepIndex, salt) * items.length) % items.length];
    }

    function getEventResponseMeta(responseId) {
      return EVENT_RESPONSES.find(item => item.id === responseId) || EVENT_RESPONSES[0];
    }

    function getSelectedEventResponse(stepIndex = gameState?.currentStep || 0) {
      const fallback = getEventResponseMeta(DEFAULT_EVENT_RESPONSE_ID);
      if (!gameState) return fallback;
      gameState.eventResponses = gameState.eventResponses || {};
      const key = String(stepIndex);
      const stored = getEventResponseMeta(gameState.eventResponses[key] || DEFAULT_EVENT_RESPONSE_ID);
      gameState.eventResponses[key] = stored.id;
      return stored;
    }

    function applyEventResponseImpact(baseImpact, response) {
      const impact = { ...baseImpact };
      Object.keys(STAT_META).forEach(key => {
        let value = impact[key] || 0;
        if (response.mitigate && value < 0) {
          value = Math.min(0, value + response.mitigate);
        }
        impact[key] = clampDelta(value + (response.impact?.[key] || 0));
      });
      return impact;
    }

    function getStepEvent(stepIndex = gameState?.currentStep || 0) {
      const event = pickBySeed(RANDOM_EVENTS, stepIndex, 31);
      const response = getSelectedEventResponse(stepIndex);
      return {
        title: event.title,
        body: event.body,
        tag: event.tag,
        baseImpact: { ...event.impact },
        impact: applyEventResponseImpact(event.impact, response),
        response: {
          id: response.id,
          label: response.label,
          hint: response.hint,
          combat: { ...response.combat }
        }
      };
    }

    function getPressureSignal(event = getStepEvent()) {
      const tag = event?.tag || '';
      if (tag.includes('健康')) return { name: '身体压力', message: '行动力正在被健康问题消耗', color: '#ff6b6b' };
      if (tag.includes('关系') || tag.includes('家庭') || tag.includes('人情')) return { name: '关系压力', message: '社交成本会影响这轮选择', color: '#d896ff' };
      if (tag.includes('规则') || tag.includes('平台')) return { name: '规则压力', message: '确定性下降，需要重新判断', color: '#d7b46a' };
      if (tag.includes('时间')) return { name: '时间压力', message: '窗口期变短，拖延会吃亏', color: '#e3b341' };
      if (tag.includes('贵人') || tag.includes('入口')) return { name: '机会窗口', message: '入口打开，但需要付出行动成本', color: '#44d07b' };
      return { name: '现实阻力', message: '局势正在挤压你的行动空间', color: '#e3b341' };
    }

    function mergeImpact(base, extra) {
      const merged = { ...base };
      Object.keys(STAT_META).forEach(key => {
        merged[key] = clampDelta((merged[key] || 0) + (extra?.[key] || 0));
      });
      return merged;
    }

    function deriveChoiceImpact(route, node, stepIndex) {
      const sheet = route.balance_sheet || {};
      const income = node.income;
      const incomeScore = income === null || income === undefined
        ? (sheet.money ?? 5)
        : Math.max(0, Math.min(10, 5 + income / 12000));
      const emotionScore = node.emotion ?? ((sheet.meaning ?? 5) + (sheet.health ?? 5)) / 2;
      const healthScore = node.health ?? sheet.health ?? 5;

      const impact = {
        money: clampDelta(Math.round(incomeScore - 5)),
        health: clampDelta(Math.round(healthScore - 5)),
        relationship: clampDelta(Math.round((sheet.relationship ?? 5) - 5)),
        meaning: clampDelta(Math.round(((sheet.meaning ?? 5) + emotionScore) / 2 - 5)),
        freedom: clampDelta(Math.round((sheet.time_freedom ?? 5) - 5))
      };

      if (stepIndex >= 2 && route.id !== gameState?.activeRouteId) {
        impact.relationship = clampDelta(impact.relationship - 1);
      }
      if (node.title.includes('？')) {
        impact.meaning = clampDelta(impact.meaning + 1);
        impact.freedom = clampDelta(impact.freedom + 1);
      }

      return impact;
    }

    function buildDilemma(route, node, stepIndex, routeIndex) {
      const templateIndex = Math.floor(stepRandom(stepIndex, routeIndex + 7) * DILEMMA_TEMPLATES.length) % DILEMMA_TEMPLATES.length;
      const template = DILEMMA_TEMPLATES[(templateIndex + routeIndex) % DILEMMA_TEMPLATES.length];
      const pressure = [];
      const income = node.income;

      if (income !== null && income !== undefined && income > 15000) pressure.push('钱会变多');
      if ((node.health ?? 5) <= 4) pressure.push('身体透支');
      if ((route.balance_sheet?.relationship ?? 5) <= 4) pressure.push('关系变薄');
      if ((route.balance_sheet?.time_freedom ?? 5) >= 7) pressure.push('自由更高');
      if ((route.balance_sheet?.meaning ?? 5) >= 7) pressure.push('意义感强');
      if (!pressure.length) pressure.push(template.pressure);

      return {
        title: template.title(node, route),
        temptation: template.temptation,
        cost: template.cost,
        pressure: [...new Set([template.pressure, ...pressure])].slice(0, 3)
      };
    }

    function getChoiceOptions() {
      if (!gameState || gameState.ended) return [];
      const stepIndex = gameState.currentStep;
      const event = getStepEvent(stepIndex);
      return routesData
        .map((route, routeIndex) => {
          const node = route.nodes[Math.min(stepIndex, route.nodes.length - 1)];
          const baseImpact = deriveChoiceImpact(route, node, stepIndex);
          const impact = mergeImpact(baseImpact, event.impact);
          const dilemma = buildDilemma(route, node, stepIndex, routeIndex);
          return {
            route,
            node,
            event,
            baseImpact,
            impact,
            dilemma,
            combat: deriveCombatStats(impact, event, route)
          };
        })
        .sort((a, b) => {
          if (a.route.id === gameState.activeRouteId) return -1;
          if (b.route.id === gameState.activeRouteId) return 1;
          return 0;
        });
    }

    function deriveCombatStats(impact, event, route) {
      const positive = Object.values(impact).filter(value => value > 0).reduce((sum, value) => sum + value, 0);
      const negative = Object.values(impact).filter(value => value < 0).reduce((sum, value) => sum + Math.abs(value), 0);
      const meaningBoost = Math.max(0, impact.meaning || 0);
      const freedomBoost = Math.max(0, impact.freedom || 0);
      const responseCombat = event?.response?.combat || {};
      const guard = Math.max(0, Math.max(impact.health || 0, 0) + Math.max(impact.relationship || 0, 0) + (responseCombat.guard || 0));
      const eventHeat = Object.values(event?.impact || {}).filter(value => value < 0).length;
      const strike = clampValue(4 + positive + meaningBoost + Math.floor(freedomBoost / 2) + (responseCombat.strike || 0), 3, 15);
      const recoil = clampValue(2 + negative + eventHeat - Math.floor(guard / 2) + (responseCombat.recoil || 0), 0, 12);
      const tempo = route?.id === gameState?.activeRouteId ? 1 : 0;
      return {
        strike: strike + tempo,
        guard,
        recoil
      };
    }

    function chooseGameOption(index) {
      const options = getChoiceOptions();
      const option = options[index];
      if (!gameState || !option) return;
      ensureDuelState();

      const statsBefore = { ...gameState.stats };
      const duelBefore = { ...gameState.duel };
      Object.entries(option.impact).forEach(([key, delta]) => {
        gameState.stats[key] = clampStat(gameState.stats[key] + delta);
      });
      const duelRound = resolveDuelRound(option, duelBefore);

      gameState.history.push({
        step: gameState.currentStep,
        timeLabel: option.node.time_label || GAME_STEPS[gameState.currentStep] || '',
        routeId: option.route.id,
        routeLabel: option.route.short_label,
        routeColor: option.route.color,
        title: option.dilemma.title,
        nodeTitle: option.node.title,
        description: option.node.description,
        dilemma: option.dilemma,
        event: option.event,
        keyEvent: option.node.key_event,
        impact: option.impact,
        baseImpact: option.baseImpact,
        duel: duelRound,
        statsBefore,
        statsAfter: { ...gameState.stats }
      });

      gameState.activeRouteId = option.route.id;
      updateGameTagsAfterChoice(option, index);
      gameState.currentStep += 1;

      if (gameState.currentStep >= getMaxSteps()) {
        gameState.ended = true;
        gameState.ending = judgeEnding(gameState);
      }

      syncWindowState();
      saveGame();
      renderMain();
      triggerImpactFeedback(duelRound);
      playSfx('impact', Math.min(1.35, 0.85 + duelRound.strike / 18));
    }

    function resolveDuelRound(option, duelBefore) {
      const combat = option.combat || deriveCombatStats(option.impact, option.event, option.route);
      const pressureAfter = clampValue(duelBefore.pressure - combat.strike, 0, duelBefore.maxPressure);
      const resolveLoss = Math.max(0, combat.recoil - combat.guard);
      const resolveAfter = clampValue(duelBefore.resolve - resolveLoss, 0, duelBefore.maxResolve);
      const breakthrough = pressureAfter === 0;
      const duelRound = {
        strike: combat.strike,
        guard: combat.guard,
        recoil: combat.recoil,
        resolveLoss,
        pressureBefore: duelBefore.pressure,
        pressureAfter,
        resolveBefore: duelBefore.resolve,
        resolveAfter,
        breakthrough,
        pressureSignal: getPressureSignal(option.event)
      };
      gameState.duel.pressure = pressureAfter;
      gameState.duel.resolve = resolveAfter;
      gameState.duel.combo = breakthrough ? (gameState.duel.combo || 0) + 1 : 0;
      gameState.duel.lastRound = duelRound;
      return duelRound;
    }

            encouragement: '暴富本身不是问题，问题是暴富之后没有准备好下一个问题。下一局在赚钱之前先想清楚为什么赚。'

            encouragement: '从一种叙事切换到另一种，需要的不是勇气，而是先承认第一种不适合你了。下一局继续寻找属于你的版本。'
          },
          {
            person: '你身边某个普通人',
            role: '没有公开叙事、但每天认真活着的匿名者',
            body: `你这局没有和任何名人重合——它更像你身边某个普通人的人生：没有戏剧性的起伏，但每个选择都是真实的。${lastRoute}不需要被验证，只需要被经历。`,
            encouragement: '不是所有人生都需要被写成传记。下一局继续按自己的节奏走，不需要对标任何人。'
