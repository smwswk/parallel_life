        ]
      };

      const pool = catalog[ending.title] || catalog.default;
      const pick = pool[Math.floor(seededRandom(state.seed + 99) * pool.length) % pool.length];
      return { ...pick, match };
    }

    function renderGame() {
      if (!gameState) return;
      ensureDuelState();
      renderStats();
      renderProgress();
      renderHistory();
      if (gameState.ended) {
        renderEnding();
      } else {
        renderDecision();
      }
    }

    function renderStats() {
      const container = document.getElementById('stat-grid');
      container.innerHTML = Object.entries(STAT_META).map(([key, meta]) => {
        const value = gameState.stats[key];
        return `
          <div class="stat-card">
            <div class="stat-icon">${meta.icon}</div>
            <div class="stat-value-row">
              <span class="stat-value" style="color:${meta.color}">${value}</span>
              <span class="stat-label">${meta.label}</span>
            </div>
            <div class="stat-track">
              <div class="stat-fill" style="width:${value * 10}%; background:${meta.color};"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderProgress() {
      const maxSteps = getMaxSteps();
      document.getElementById('game-step-label').textContent = gameState.ended
        ? `${gameState.careerName} · 本局已结束`
        : `${gameState.careerName} · ${GAME_STEPS[gameState.currentStep] || '下一站'}`;
      document.getElementById('game-phase-label').textContent = gameState.ended
        ? '结局判定'
        : `第 ${gameState.currentStep + 1} 站 / ${maxSteps}`;
      document.getElementById('progress-dots').innerHTML = Array.from({ length: maxSteps }, (_, index) => {
        const cls = index < gameState.currentStep ? 'done' : index === gameState.currentStep && !gameState.ended ? 'current' : '';
        return `<span class="progress-dot ${cls}"></span>`;
      }).join('');
    }

    function renderDecision() {
      const stepIndex = gameState.currentStep;
      const options = getChoiceOptions();
      const event = getStepEvent(stepIndex);
      const last = gameState.history[gameState.history.length - 1];
      const stage = document.getElementById('game-stage');
      const endingCard = document.getElementById('ending-card');
      stage.style.display = 'block';
      endingCard.style.display = 'none';

      document.getElementById('game-event-title').textContent = `${GAME_STEPS[stepIndex] || '下一站'}`;
      const tagFlavor = getTagAwareFlavor(null, null, stepIndex);
      document.getElementById('game-event-desc').textContent = last
        ? `上一步：${last.title}`
        : '选择一条路，下注这一站。';
      const ctx = document.getElementById('game-route-context');
      ctx.textContent = last
        ? `倾向：${last.routeLabel}${gameState.tags?.stayed_loyal ? ' · 深耕中' : ''}`
        : '每个按钮代表一条路线这一站的抉择。';
      ctx.style.display = 'none';
      renderDuelBoard(event);

      let eventEl = document.getElementById('random-event-card');
      if (!eventEl) {
        eventEl = document.createElement('div');
        eventEl.id = 'random-event-card';
        document.getElementById('battle-panel').after(eventEl);
      }
      const isExpanded = eventEl.getAttribute('aria-expanded') === 'true';
      eventEl.className = 'random-event-card' + (isExpanded ? ' expanded' : '');
      eventEl.setAttribute('role', 'button');
      eventEl.setAttribute('tabindex', '0');
      eventEl.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
      eventEl.onclick = toggleRandomEventCard;
      eventEl.onkeydown = (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleRandomEventCard();
        }
      };
      eventEl.innerHTML = `
        <div class="event-kicker-row">
          <div class="event-kicker">⚡ ${event.tag} · ${event.title}</div>
          <span class="event-toggle" aria-hidden="true">⌄</span>
        </div>
        <div class="event-response-row" aria-label="选择事件应对">
          ${EVENT_RESPONSES.map(response => {
            const copy = getEventResponseLabel(response.id, event.tag);
            const label = copy?.label || response.label;
            return `
              <button
                type="button"
                class="event-response-btn${event.response?.id === response.id ? ' active' : ''}"
                onclick="event.stopPropagation(); selectEventResponse('${response.id}')"
              >${label}</button>
            `;
          }).join('')}
        </div>
        <p class="event-body">${event.body}</p>
        <div class="event-detail-row">
          <span class="event-detail-label">影响</span>
          <div class="impact-row">${renderImpact(event.impact)}</div>
        </div>
      `;

      document.getElementById('game-choices').innerHTML = options.map((option, index) => `
        <div class="game-choice playable-card" role="button" tabindex="0" onclick="chooseGameOption(${index})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();chooseGameOption(${index});}">
          <div class="choice-title">${option.dilemma.title}</div>
        </div>
      `).join('');
    }

    function formatActionTitle(option) {
      const rawTitle = option.dilemma?.title || option.node?.title || '选择';
      const nodeTitle = (option.node?.title || '').replace(/[？?]/g, '');
      let verb = '行动';
      if (rawTitle.includes('接下')) verb = '强攻';
      else if (rawTitle.includes('暂时')) verb = '防守';
      else if (rawTitle.includes('反向')) verb = '反打';
      else if (rawTitle.includes('放弃')) verb = '换招';
      else if (rawTitle.includes('做成作品')) verb = '蓄力';
      const target = nodeTitle.length > 8 ? nodeTitle.slice(0, 8) : nodeTitle;
      return `${verb} · ${target || option.route.short_label}`;
    }

    function selectEventResponse(responseId) {
      if (!gameState || gameState.ended) return;
      const response = getEventResponseMeta(responseId);
      gameState.eventResponses = gameState.eventResponses || {};
      gameState.eventResponses[String(gameState.currentStep)] = response.id;
      syncWindowState();
      saveGame();
      renderMain();
      playSfx('tap', 0.55);
    }

    function triggerImpactFeedback(duelRound) {
      const shell = document.querySelector('.game-shell');
      if (!shell || !duelRound) return;
      shell.classList.remove('impact-burst');
      void shell.offsetWidth;
      shell.classList.add('impact-burst');

      const flash = document.createElement('div');
      flash.className = 'impact-flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 480);
      setTimeout(() => shell.classList.remove('impact-burst'), 540);
    }

    function renderDuelBoard(event) {
      const duel = ensureDuelState();
      const panel = document.getElementById('battle-panel');
      const signal = getPressureSignal(event);
      const last = duel.lastRound;
      const pressurePct = duel.maxPressure ? duel.pressure / duel.maxPressure * 100 : 0;
      const resolvePct = duel.maxResolve ? duel.resolve / duel.maxResolve * 100 : 0;
      panel.className = `battle-panel${last ? ' clash' : ''}`;
      panel.innerHTML = `
        <div class="duel-board">
          <div class="duel-side">
            <div class="duel-meter"><div class="duel-fill" style="width:${resolvePct}%; background:#d7b46a;"></div></div>
          </div>
          <div class="duel-vs">vs</div>
          <div class="duel-side">
            <div class="duel-meter"><div class="duel-fill" style="width:${pressurePct}%; background:${signal.color};"></div></div>
          </div>
        </div>
      `;
    }

    function renderDuelLog(last) {
      if (!last) return '局势压力已出现：先处理变数，再打出路线牌。';
      const recoil = last.resolveLoss > 0 ? `，反噬 -${last.resolveLoss}` : '，你稳住了反噬';
      const breakthrough = last.breakthrough ? '，破局！' : '';
      return `你推进 -${last.strike}${recoil}${breakthrough}`;
    }

    function renderDamageFloats(last) {
      const parts = [
        `<span class="damage-float">-${last.strike}</span>`,
        `<span class="damage-float shock">冲击</span>`
      ];
      if (last.resolveLoss > 0) {
        parts.push(`<span class="damage-float player">-${last.resolveLoss}</span>`);
      }
      return parts.join('');
    }

    function toggleRandomEventCard() {
      const eventEl = document.getElementById('random-event-card');
      if (!eventEl) return;
      const expanded = eventEl.getAttribute('aria-expanded') !== 'true';
      eventEl.classList.toggle('expanded', expanded);
      eventEl.setAttribute('aria-expanded', String(expanded));
    }

    function compactNodeSummary(node) {
      const text = (node.description || node.title || '').replace(/\s+/g, '');
      return text.length > 18 ? text.slice(0, 18) + '...' : text;
    }

    function renderImpact(impact) {
      return Object.entries(impact).map(([key, value]) => {
        const cls = value > 0 ? 'up' : value < 0 ? 'down' : '';
        return `<span class="impact-pill ${cls}">${STAT_META[key].label} ${signed(value)}</span>`;
      }).join('');
    }

    function renderTopImpact(impact) {
      const entries = Object.entries(impact)
        .filter(([, value]) => value !== 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
        .slice(0, 2);
      const visible = entries.length ? entries : Object.entries(impact).slice(0, 1);
      return visible.map(([key, value]) => {
        const cls = value > 0 ? 'up' : value < 0 ? 'down' : '';
        return `<span class="impact-pill ${cls}">${STAT_META[key].label} ${signed(value)}</span>`;
      }).join('');
    }


    function renderHistory() {
      const box = document.getElementById('game-history');
      if (!gameState.history.length) {
        box.classList.remove('active');
        box.innerHTML = '';
        return;
      }

      box.classList.add('active');
      box.innerHTML = `
        <h3>已发生的选择</h3>
        <div class="history-list">
          ${gameState.history.map(item => `
            <div class="history-item">
              <span class="history-badge">${item.timeLabel}</span>
              <span><strong style="color:${item.routeColor}">${item.routeLabel}</strong> · ${item.title}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderEnding() {
      document.getElementById('game-stage').style.display = 'none';
      const card = document.getElementById('ending-card');
      const ending = gameState.ending || judgeEnding(gameState);
      if (!ending.parallel) {
        ending.parallel = chooseRealLifeParallel(gameState, ending);
        gameState.ending = ending;
        saveGame();
      }

      // Meta 奖励判定（每局只发一次）
      let metaResult = null;
      let newRelics = [];
      if (!gameState.metaAwarded) {
        gameState.metaAwarded = true;
        const score = Object.values(gameState.stats).reduce((sum, v) => sum + v, 0);
        metaResult = awardGameEnd(ending.title, score);
        newRelics = generateRelics(gameState);
        saveRelics(newRelics);
        saveGame();
      }

      card.style.display = 'block';
      card.innerHTML = `
        <h2 id="ending-title">${ending.title}</h2>
        <p>${ending.tone}</p>
        ${renderEndingParallel(ending.parallel)}
        <div class="impact-row" style="margin-top:12px;">${renderEndingStats()}</div>
        ${newRelics.length ? renderRelics(newRelics) : ''}
        ${metaResult ? renderMetaLevelUp(metaResult) : renderMetaBrief()}
        <div class="ending-actions">
          <button class="btn btn-primary" data-action="restart" onclick="restartGame(true)">重开一局</button>
          <button class="btn btn-glow" data-action="share" onclick="shareGame()">分享本局</button>
          <button class="btn btn-glow" data-action="card" onclick="renderLifeCard()" style="grid-column:1/-1; font-size:0.82rem;">生成人生名片</button>
        </div>
      `;
    }

    function renderRelics(relics) {
      return `
        <div class="relic-section" style="margin-top:8px; padding:8px 10px; background:rgba(215,180,106,0.05); border:1px solid rgba(215,180,106,0.12); border-radius:8px;">
          <div class="relic-kicker" style="color:#e3b341; font-size:0.6rem; letter-spacing:0.06em; margin-bottom:5px;">纪念品</div>
          ${relics.map(r => `
            <div class="relic-item" style="display:flex; align-items:flex-start; gap:6px; margin-bottom:5px; padding-bottom:5px; border-bottom:1px solid rgba(90,106,122,0.1);">
              <span style="font-size:0.55rem; color:${r.rarity === 'legendary' ? '#e3b341' : r.rarity === 'epic' ? '#d896ff' : r.rarity === 'rare' ? '#44d07b' : '#8d8574'}; flex-shrink:0; margin-top:2px;">${r.rarity === 'legendary' ? '✧' : r.rarity === 'epic' ? '◆' : r.rarity === 'rare' ? '◇' : '·'}</span>
              <div style="flex:1; min-width:0;">
                <div style="color:#e0ecff; font-size:0.76rem; font-weight:500;">${r.name}</div>
                <div style="color:var(--text-dim); font-size:0.65rem; line-height:1.35; margin-top:1px;">${r.story}</div>
                <div style="color:${r.buff.stat === 'all' ? '#e3b341' : '#44d07b'}; font-size:0.6rem; margin-top:2px;">${r.buff.flavor}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMetaBrief() {
      const meta = getMetaProgress();
      const lvl = computeLevel(meta.xp);
      const next = getNextLevel(meta.xp);
      if (!next) return `<div class="meta-level-bar" style="margin-top:14px;"><span class="meta-level-label">人生阅历 Lv.${lvl.level} ${lvl.label}</span><span class="meta-xp-text">满级</span></div>`;
      const pct = next ? Math.round((meta.xp - lvl.xp) / (next.xp - lvl.xp) * 100) : 100;
      return `
        <div class="meta-level-bar" style="margin-top:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span class="meta-level-label">人生阅历 Lv.${lvl.level} ${lvl.label}</span>
            <span class="meta-xp-text">${meta.xp}/${next.xp} XP</span>
          </div>
          <div class="meta-xp-track"><div class="meta-xp-fill" style="width:${pct}%"></div></div>
          <div class="meta-next-reward">下一级${next.reward ? '解锁：' + next.desc : '：' + next.label}</div>
          <div class="meta-total-stats">累计 ${meta.totalGames} 局 · ${meta.uniqueEndings.length} 种结局 · 最高 ${meta.highestScore} 分</div>
        </div>
      `;
    }

    function renderMetaLevelUp(result) {
      const { meta, gained, leveledUp, newLevel, oldLevel } = result;
      const next = getNextLevel(meta.xp);
      const lvlPct = next ? Math.round((meta.xp - newLevel.xp) / (next.xp - newLevel.xp) * 100) : 100;
      return `
        <div class="meta-level-bar" style="margin-top:14px;">
          <div class="meta-gained" style="margin-bottom:6px;">+${gained} XP${leveledUp ? ' · 升到 Lv.' + newLevel.level + ' 「' + newLevel.label + '」' : ''}</div>
          ${leveledUp && newLevel.reward ? `<div class="meta-unlock">✦ 解锁：${newLevel.desc}</div>` : ''}
          <div style="display:flex;justify-content:space-between;margin-top:8px;margin-bottom:4px;">
            <span class="meta-level-label">人生阅历 Lv.${newLevel.level} ${newLevel.label}</span>
            <span class="meta-xp-text">${meta.xp}/${next ? next.xp : '—'} XP</span>
          </div>
          <div class="meta-xp-track"><div class="meta-xp-fill" style="width:${next ? lvlPct : 100}%"></div></div>
          ${next && next.reward ? `<div class="meta-next-reward">下一级解锁：${next.desc}</div>` : ''}
          <div class="meta-total-stats">累计 ${meta.totalGames} 局 · ${meta.uniqueEndings.length} 种结局 · 最高 ${meta.highestScore} 分</div>
        </div>
      `;
    }

    function renderEndingParallel(parallel) {
      if (!parallel) return '';
      return `
        <section class="ending-parallel">
          <div class="parallel-kicker">现实参照</div>
          <div class="parallel-head">
            <div>
              <span class="parallel-person">${parallel.person}</span>
              <span class="parallel-role">${parallel.role}</span>
            </div>
            <span class="parallel-match">${parallel.match}%</span>
          </div>
          <p class="parallel-body">${parallel.body}</p>
          <p class="ending-encouragement">${parallel.encouragement}</p>
          <p class="parallel-note">这不是命运判词，只是把你的选择投到一个公开人生样本上，帮你看清下一局该调什么。</p>
        </section>
      `;
    }

    function renderEndingStats() {
      return Object.entries(gameState.stats).map(([key, value]) =>
        `<span class="impact-pill">${STAT_META[key].label} ${value}/10</span>`
      ).join('');
    }

    function saveGame() {
      if (!gameState) return;
      safeStorageSet(SAVE_KEY, JSON.stringify(gameState));
      updateResumeButton();
    }

    function normalizeLoadedGameState() {
      if (!gameState) return;
      const routeById = new Map(routesData.map(route => [route.id, route]));
      (gameState.history || []).forEach(item => {
        const route = routeById.get(item.routeId);
        if (route) item.routeColor = route.color;
      });
      gameState.eventResponses = gameState.eventResponses || {};
      ensureDuelState();
    }

    async function restoreGameFromSave() {
      const raw = safeStorageGet(SAVE_KEY);
      if (!raw) return false;
      const saved = JSON.parse(raw);
      await loadData(saved.careerId);
      gameState = saved;
      gameState.seed = gameState.seed || makeSeed();
      gameState.metaAwarded = gameState.metaAwarded || gameState.ended; // 防止重复奖励
      selectedCareerId = saved.careerId;
      normalizeLoadedGameState();
      syncWindowState();
      showScene(3);
      renderMain();
      return true;
    }

    function updateResumeButton() {
      const btn = document.getElementById('btn-resume');
      if (!btn) return;
      btn.style.display = safeStorageGet(SAVE_KEY) ? 'inline-block' : 'none';
    }

    function restartGame(showRelicSelect) {
      safeStorageRemove(SAVE_KEY);
      gameState = null;
      selectedCareerId = null;
      window._selectedRelicIds = null;
      syncWindowState();
      document.querySelectorAll('.career-card').forEach(c => c.classList.remove('selected'));
      const btn = document.getElementById('btn-generate');
      btn.style.opacity = 0.4;
      btn.style.pointerEvents = 'none';
      document.getElementById('share-feedback').textContent = '';
      updateResumeButton();
      showScene(2);
      selectCareer(CAREERS[0].id);
      if (showRelicSelect) renderRelicSelect();
    }

    function renderRelicSelect() {
      if (!hasFeature('relic_slot')) return;
      const panel = document.getElementById('meta-panel');
      if (!panel) return;
      const meta = getMetaProgress();
      const myRelics = (meta.relics || []).map(r => getRelicById(r.id)).filter(Boolean);
      if (!myRelics.length) return;

      const maxSlots = hasFeature('second_relic') ? 2 : 1;
      panel.innerHTML = '<div class="relic-select-section" style="text-align:left; margin-top:16px;"><div style="color:#e3b341; font-size:0.7rem; letter-spacing:0.06em; margin-bottom:8px;">携带纪念品（可选' + maxSlots + '个）</div><div style="display:flex; flex-direction:column; gap:6px;" id="relic-select-list">' +
        myRelics.map(r => '<div class="relic-select-item" data-relic="' + r.id + '" onclick="toggleRelicSelection(\'' + r.id + '\')" style="padding:8px 10px; border:1px solid rgba(90,106,122,0.25); border-radius:8px; cursor:pointer; background:rgba(17,24,32,0.5); transition:border-color 0.2s;"><div style="display:flex; justify-content:space-between; align-items:center;"><span style="color:#e0ecff; font-size:0.78rem;">' + r.name + '</span><span style="font-size:0.6rem; color:' + (r.rarity === 'legendary' ? '#e3b341' : r.rarity === 'epic' ? '#d896ff' : '#8d8574') + ';">' + (r.rarity === 'legendary' ? '传说' : r.rarity === 'epic' ? '史诗' : r.rarity === 'rare' ? '稀有' : '普通') + '</span></div><div style="color:var(--text-dim); font-size:0.68rem; margin-top:3px; line-height:1.3;">' + r.story.slice(0, 80) + (r.story.length > 80 ? '...' : '') + '</div><div style="color:#44d07b; font-size:0.66rem; margin-top:3px;">' + r.buff.flavor + '</div></div>').join('') +
        '</div><div style="color:var(--text-dim); font-size:0.64rem; margin-top:6px; text-align:center;" id="relic-select-hint">点击选择，开局即生效（可选可不选）</div></div>';
      document.getElementById('meta-panel').innerHTML += renderMetaPanel().replace('<div class="meta-level-bar"', '<div class="meta-level-bar" style="margin-top:12px;"');

    function toggleRelicSelection(relicId) {
      if (!hasFeature('relic_slot')) return;
      const maxSlots = hasFeature('second_relic') ? 2 : 1;
      let selected = window._selectedRelicIds || [];
      if (selected.includes(relicId)) {
        selected = selected.filter(function(id) { return id !== relicId; });
      } else {
        if (selected.length >= maxSlots) selected.shift();
        selected.push(relicId);
      }
      window._selectedRelicIds = selected;

      document.querySelectorAll('.relic-select-item').forEach(function(el) {
        var rid = el.getAttribute('data-relic');
        el.style.borderColor = selected.includes(rid) ? '#d7b46a' : 'rgba(90,106,122,0.25)';
        el.style.background = selected.includes(rid) ? 'rgba(215,180,106,0.1)' : 'rgba(17,24,32,0.5)';
      });

      var hint = document.getElementById('relic-select-hint');
      if (hint) hint.textContent = selected.length ? '已选 ' + selected.length + '/' + maxSlots + ' 个纪念品' : '点击选择，开局即生效（可选可不选）';
    }

    function encodePayload(payload) {
      const bytes = new TextEncoder().encode(JSON.stringify(payload));
      let binary = '';
      bytes.forEach(byte => { binary += String.fromCharCode(byte); });
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function decodePayload(encoded) {
      const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
      const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function buildShareUrl() {
      if (!gameState) return location.href.split('#')[0];
      const payload = {
        careerId: gameState.careerId,
        seed: gameState.seed,
        currentStep: gameState.currentStep,
        activeRouteId: gameState.activeRouteId,
        stats: gameState.stats,
        eventResponses: gameState.eventResponses || {},
        history: gameState.history,
        ended: gameState.ended,
        ending: gameState.ending
      };
      return `${location.href.split('#')[0]}#life=${encodePayload(payload)}`;
    }

      const url = buildShareUrl();
      location.hash = url.split('#')[1] || '';
      const feedback = document.getElementById('share-feedback');
      try {
        await navigator.clipboard.writeText(url);
        feedback.textContent = '链接已复制';

    // ============================================================
    // 人生名片 Canvas 生成
    // ============================================================
    function renderLifeCard() {
      const ending = gameState.ending || judgeEnding(gameState);
      const score = Object.values(gameState.stats).reduce((sum, v) => sum + v, 0);
      const meta = getMetaProgress();
      const lvl = computeLevel(meta.xp);
      const parallel = ending.parallel || chooseRealLifeParallel(gameState, ending);

      const W = 900, H = 1600;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const c = canvas.getContext('2d');
      const keys = Object.keys(STAT_META);

      // ========== 背景 ==========
      const grad = c.createRadialGradient(W/2, H*0.35, 100, W/2, H*0.5, H*0.8);
      grad.addColorStop(0, '#12100c');
      grad.addColorStop(1, '#0a0a08');
      c.fillStyle = grad;
      c.fillRect(0, 0, W, H);

      // 噪点纹理
      for (let i = 0; i < 800; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        c.fillStyle = `rgba(255,255,255,${Math.random() * 0.015})`;
        c.fillRect(x, y, 1.5, 1.5);
      }

      // ========== 顶部品牌区 ==========
      c.fillStyle = 'rgba(201,168,76,0.6)';
      c.font = '300 16px -apple-system, "PingFang SC", sans-serif';
      c.textAlign = 'center';
      c.fillText('平行人生', W/2, 80);

      // 顶部细金线
      c.strokeStyle = 'rgba(201,168,76,0.3)';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(W/2 - 40, 100);
      c.lineTo(W/2 + 40, 100);
      c.stroke();

      c.fillStyle = '#5a5548';
      c.font = '12px -apple-system, "PingFang SC", sans-serif';
      c.fillText(`第 ${meta.totalGames} 局 · Lv.${lvl.level} ${lvl.label}`, W/2, 130);
      c.textAlign = 'left';

      // ========== 结局标题区 ==========
      // 职业徽章
      const badgeW = c.measureText(gameState.careerName).width + 32;
      const badgeX = (W - badgeW) / 2;
      c.fillStyle = 'rgba(201,168,76,0.08)';
      c.strokeStyle = 'rgba(201,168,76,0.25)';
      c.lineWidth = 1;
      c.beginPath();
      c.roundRect(badgeX, 190, badgeW, 32, 16);
      c.fill();
      c.stroke();
      c.fillStyle = '#c9a84c';
      c.font = '14px -apple-system, "PingFang SC", sans-serif';
      c.textAlign = 'center';
      c.fillText(gameState.careerName, W/2, 212);

      // 结局标题
      c.fillStyle = '#f0ebe3';
      c.font = '600 48px -apple-system, "PingFang SC", sans-serif';
      const titleLines = wrapText(c, ending.title, W - 120, 48);
      titleLines.forEach((line, i) => {
        c.fillText(line, W/2, 290 + i * 58);
      });

      // 总分
      const scoreY = 290 + titleLines.length * 58 + 30;
      c.fillStyle = '#c9a84c';
      c.font = '300 18px -apple-system, "PingFang SC", sans-serif';
      c.fillText('人生总分', W/2, scoreY);
      c.fillStyle = '#f0ebe3';
      c.font = '600 72px -apple-system, "PingFang SC", sans-serif';
      c.fillText(String(score), W/2, scoreY + 72);
      c.fillStyle = '#5a5548';
      c.font = '20px -apple-system, "PingFang SC", sans-serif';
      c.fillText('/ 50', W/2 + c.measureText(String(score)).width/2 + 18, scoreY + 58);

      // 装饰短线
      const lineY = scoreY + 100;
      c.strokeStyle = 'rgba(201,168,76,0.2)';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(W/2 - 60, lineY);
      c.lineTo(W/2 + 60, lineY);
      c.stroke();

      // ========== 五维雷达区 ==========
      const radarY = lineY + 60;
      c.fillStyle = '#5a5548';
      c.font = '12px -apple-system, "PingFang SC", sans-serif';
      c.textAlign = 'center';
      c.fillText('人 生 五 维', W/2, radarY);

      // 绘制雷达图
      const cx = W/2, cy = radarY + 280, R = 200;
      const angleStep = (Math.PI * 2) / 5;
      const startA = -Math.PI / 2;

      // 网格层
      for (let layer = 1; layer <= 5; layer++) {
        const r = R * layer / 5;
        c.beginPath();
        for (let i = 0; i <= 5; i++) {
          const a = startA + i * angleStep;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
        }
        c.closePath();
        c.strokeStyle = layer === 5 ? 'rgba(201,168,76,0.12)' : 'rgba(255,255,255,0.025)';
        c.lineWidth = layer === 5 ? 1.5 : 0.5;
        c.stroke();
      }

      // 轴线
      for (let i = 0; i < 5; i++) {
        const a = startA + i * angleStep;
        c.beginPath();
        c.moveTo(cx, cy);
        c.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
        c.strokeStyle = 'rgba(255,255,255,0.03)';
        c.lineWidth = 0.5;
        c.stroke();
      }

      // 数据多边形
      c.beginPath();
      for (let i = 0; i <= 5; i++) {
        const idx = i % 5;
        const a = startA + idx * angleStep;
        const v = gameState.stats[keys[idx]] / 10;
        const r = R * v;
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
      }
      c.closePath();
      c.fillStyle = 'rgba(201,168,76,0.1)';
      c.fill();
      c.strokeStyle = 'rgba(201,168,76,0.35)';
      c.lineWidth = 2;
      c.stroke();

      // 顶点发光圆点
      for (let i = 0; i < 5; i++) {
        const a = startA + i * angleStep;
        const v = gameState.stats[keys[i]] / 10;
        const r = R * v;
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        // 发光
        c.beginPath();
        c.arc(x, y, 10, 0, Math.PI * 2);
        c.fillStyle = 'rgba(201,168,76,0.15)';
        c.fill();
        // 实心
        c.beginPath();
        c.arc(x, y, 5, 0, Math.PI * 2);
        c.fillStyle = STAT_META[keys[i]].color;
        c.fill();
        c.strokeStyle = '#0a0a08';
        c.lineWidth = 2;
        c.stroke();
      }

      // 维度标签 + 数值
      for (let i = 0; i < 5; i++) {
        const a = startA + i * angleStep;
        const lx = cx + Math.cos(a) * (R + 42);
        const ly = cy + Math.sin(a) * (R + 42);
        const m = STAT_META[keys[i]];
        const val = gameState.stats[keys[i]];
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillStyle = '#7a7569';
        c.font = '12px -apple-system, "PingFang SC", sans-serif';
        c.fillText(m.label, lx, ly - 8);
        c.fillStyle = m.color;
        c.font = '600 14px -apple-system, "PingFang SC", sans-serif';
        c.fillText(String(val), lx, ly + 8);
      }
      c.textBaseline = 'alphabetic';

      // ========== 现实参照区 ==========
      const refY = cy + R + 90;
      if (parallel) {
        // 玻璃态卡片背景
        c.fillStyle = 'rgba(255,255,255,0.025)';
        c.strokeStyle = 'rgba(255,255,255,0.06)';
        c.lineWidth = 1;
        c.beginPath();
        c.roundRect(60, refY, W - 120, 300, 16);
        c.fill();
        c.stroke();

        // 标签
        c.fillStyle = 'rgba(201,168,76,0.6)';
        c.font = '11px -apple-system, "PingFang SC", sans-serif';
        c.textAlign = 'left';
        c.fillText('现实参照', 90, refY + 36);

        // 名人姓名
        c.fillStyle = '#f0ebe3';
        c.font = '600 26px -apple-system, "PingFang SC", sans-serif';
        c.fillText(parallel.person, 90, refY + 76);

        // 角色
        c.fillStyle = '#5a5548';
        c.font = '13px -apple-system, "PingFang SC", sans-serif';
        c.fillText(parallel.role, 90, refY + 100);

        // 重合度徽章
        const matchText = `重合度 ${parallel.match}%`;
        const matchW = c.measureText(matchText).width + 24;
        c.fillStyle = 'rgba(201,168,76,0.1)';
        c.strokeStyle = 'rgba(201,168,76,0.2)';
        c.beginPath();
        c.roundRect(90, refY + 120, matchW, 28, 14);
        c.fill();
        c.stroke();
        c.fillStyle = '#c9a84c';
        c.font = '12px -apple-system, "PingFang SC", sans-serif';
        c.textAlign = 'center';
        c.fillText(matchText, 90 + matchW/2, refY + 139);

        // 描述文字
        c.fillStyle = '#9a9588';
        c.font = '14px -apple-system, "PingFang SC", sans-serif';
        c.textAlign = 'left';
        const bodyLines = wrapText(c, parallel.body, W - 200, 14);
        bodyLines.forEach((line, i) => {
          c.fillText(line, 90, refY + 186 + i * 24);
        });
      }

      // ========== 底部区 ==========
      const footY = H - 100;
      // 顶部金线
      c.strokeStyle = 'rgba(201,168,76,0.15)';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(80, footY);
      c.lineTo(W - 80, footY);
      c.stroke();

      c.fillStyle = '#3a3530';
      c.font = '11px -apple-system, "PingFang SC", sans-serif';
      c.textAlign = 'center';
      c.fillText('平行人生 · PARALLEL LIFE', W/2, footY + 30);
      c.fillText(`生成于 ${new Date().toLocaleDateString('zh-CN')}`, W/2, footY + 52);

      // 底部角落装饰
      c.strokeStyle = 'rgba(201,168,76,0.15)';
      c.lineWidth = 1;
      // 左上
      c.beginPath(); c.moveTo(40, H - 40); c.lineTo(40, H - 60); c.lineTo(60, H - 60); c.stroke();
      // 右上
      c.beginPath(); c.moveTo(W - 40, H - 40); c.lineTo(W - 40, H - 60); c.lineTo(W - 60, H - 60); c.stroke();
      // 左下
      c.beginPath(); c.moveTo(40, 40); c.lineTo(40, 60); c.lineTo(60, 60); c.stroke();
      // 右下
      c.beginPath(); c.moveTo(W - 40, 40); c.lineTo(W - 40, 60); c.lineTo(W - 60, 60); c.stroke();

      c.textAlign = 'left';
      showCardOverlay(canvas);
    }

    function wrapText(c, text, maxWidth, fontSize) {
      const words = text.split('');
      const lines = [];
      let current = '';
      for (let i = 0; i < words.length; i++) {
        const test = current + words[i];
        const metrics = c.measureText(test);
        if (metrics.width > maxWidth && current.length > 0) {
          lines.push(current);
          current = words[i];
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);
      return lines.slice(0, 5);
    }

    function renderTree() {
      const wrap = document.getElementById('tree-wrap');
      const w = wrap.clientWidth;
      const h = 460;
      const margin = { t: 40, r: 100, b: 30, l: 80 };

      const svg = d3.select('#tree-wrap').append('svg')
        .attr('viewBox', `0 0 ${w} ${h}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      const g = svg.append('g');
      const sx = margin.l;
      const sy = h / 2;
      const rsp = (h - margin.t - margin.b) / (routesData.length + 1);
      const nsp = (w - margin.l - margin.r - 60) / 4;

      // 计算带抖动的节点位置（基于 seed 保持一致性）
      const seedBase = gameState?.seed || 1;
      const nodePositions = [];
      const routeBaseY = [];
      routesData.forEach((route, ri) => {
        nodePositions[ri] = [];
        const baseY = margin.t + (ri + 1) * rsp;
        routeBaseY[ri] = baseY;
        route.nodes.forEach((node, ni) => {
          const jitterX = (seededRandom(seedBase + ri * 131 + ni * 37) - 0.5) * 28;
          const jitterY = (seededRandom(seedBase + ri * 173 + ni * 61) - 0.5) * 36;
          nodePositions[ri][ni] = {
            x: sx + (ni + 1) * nsp + jitterX,
            y: baseY + jitterY
          };
        });
      });

      // 画"可能性网" — 同 step 不同 route 之间的连接线
      const maxNodes = Math.max(...routesData.map(r => r.nodes.length));
      for (let ni = 0; ni < maxNodes; ni++) {
        for (let ri = 0; ri < routesData.length; ri++) {
          for (let rj = ri + 1; rj < routesData.length; rj++) {
            if (!nodePositions[ri][ni] || !nodePositions[rj][ni]) continue;
            const p1 = nodePositions[ri][ni];
            const p2 = nodePositions[rj][ni];
            g.append('line')
              .attr('x1', p1.x).attr('y1', p1.y)
              .attr('x2', p2.x).attr('y2', p2.y)
              .attr('stroke', 'var(--border)')
              .attr('stroke-width', 0.6)
              .attr('stroke-dasharray', '2 5')
              .attr('opacity', 0.22);
          }
        }
      }

      // 画"改道可能性" — 相邻 step 不同 route 之间的斜线
      for (let ni = 0; ni < maxNodes - 1; ni++) {
        for (let ri = 0; ri < routesData.length; ri++) {
          for (let rj = 0; rj < routesData.length; rj++) {
            if (ri === rj) continue;
            if (!nodePositions[ri][ni] || !nodePositions[rj][ni + 1]) continue;
            if (seededRandom(seedBase + ri * 7 + rj * 11 + ni * 13) > 0.5) continue;
            const p1 = nodePositions[ri][ni];
            const p2 = nodePositions[rj][ni + 1];
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2 + (rj > ri ? 22 : -22);
            g.append('path')
              .attr('d', d3.line().curve(d3.curveBasis)([[p1.x, p1.y], [midX, midY], [p2.x, p2.y]]))
              .attr('stroke', 'var(--border)')
              .attr('stroke-width', 0.5)
              .attr('fill', 'none')
              .attr('stroke-dasharray', '2 6')
              .attr('opacity', 0.15);
          }
        }
      }

      // 画用户实际走过的路径（跨路线时显示斜线）
      if (gameState?.history?.length) {
        let prevPos = { x: sx, y: sy };
        gameState.history.forEach((item, hi) => {
          const routeIdx = routesData.findIndex(r => r.id === item.routeId);
          if (routeIdx >= 0 && nodePositions[routeIdx]?.[hi]) {
            const pos = nodePositions[routeIdx][hi];
            const midX = (prevPos.x + pos.x) / 2;
            const midY = (prevPos.y + pos.y) / 2 + (routeIdx % 2 === 0 ? 12 : -12);
            g.append('path')
              .attr('d', d3.line().curve(d3.curveBasis)([[prevPos.x, prevPos.y], [midX, midY], [pos.x, pos.y]]))
              .attr('stroke', item.routeColor || '#d7b46a')
              .attr('stroke-width', 2.5)
              .attr('fill', 'none')
              .attr('opacity', 0.85);
            prevPos = pos;
          }
        });
      }

      // 不可逆点（基于抖动后的位置）
      routesData.forEach((route, ri) => {
        route.irreversible_points.forEach(ip => {
          const mi = Math.floor(ip.at_month / 3);
          const clampedMi = Math.min(mi, route.nodes.length - 1);
          const pos = nodePositions[ri]?.[clampedMi];
          if (!pos) return;
          g.append('circle').attr('class', 'ir-marker')
            .attr('cx', pos.x).attr('cy', pos.y - 38).attr('r', 4)
            .attr('fill', '#e3b341').attr('stroke', '#0e0e0b').attr('stroke-width', 2);
          g.append('text').attr('class', 'ir-text')
            .attr('x', pos.x).attr('y', pos.y - 50).attr('text-anchor', 'middle')
            .text('⚠ ' + ip.label);
        });
      });

      // 路线（基于抖动位置）
      routesData.forEach((route, ri) => {
        const isActiveRoute = gameState?.activeRouteId === route.id;
        const pts = [[sx, sy]];
        route.nodes.forEach((_, ni) => {
          if (nodePositions[ri][ni]) pts.push([nodePositions[ri][ni].x, nodePositions[ri][ni].y]);
        });

        g.append('path')
          .attr('class', `route-path ${route.is_real || isActiveRoute ? 'real' : 'dashed'}`)
          .attr('d', d3.line().curve(d3.curveBasis)(pts))
          .attr('stroke', route.color);

        // 路线标签
        const lastPos = nodePositions[ri][route.nodes.length - 1];
        const lx = lastPos ? lastPos.x + 44 : sx + 4.2 * nsp;
        const ly = lastPos ? lastPos.y : routeBaseY[ri];
        g.append('rect').attr('fill', 'var(--bg-card)').attr('stroke', 'var(--border)')
          .attr('x', lx - 4).attr('y', ly - 14).attr('width', 90).attr('height', 22).attr('rx', 4);
        g.append('text').attr('x', lx).attr('y', ly - 2)
          .attr('fill', route.color).attr('font-size', '10px').attr('font-weight', '500')
          .text(route.short_label + (isActiveRoute ? ' ●' : route.is_real ? ' ★' : ''));
      });

      // 起点
      g.append('circle').attr('class', 'start-circle')
        .attr('cx', sx).attr('cy', sy).attr('r', 10);
      g.append('text').attr('class', 'start-text')
        .attr('x', sx - 16).attr('y', sy + 4).text('现在的你');

      // 节点
      routesData.forEach((route, ri) => {
        route.nodes.forEach((node, ni) => {
          const pos = nodePositions[ri][ni];
          if (!pos) return;
          const x = pos.x;
          const y = pos.y;
          const isOpen = node.income === null;
          const icon = getIcon(node.title);

          const chosen = gameState?.history?.some(item => item.routeId === route.id && item.step === ni);
          const grp = g.append('g').attr('class', `node-card-group${chosen ? ' chosen' : ''}`)
            .on('click', () => showDetail(route, node));

          // 卡片背景
          grp.append('rect').attr('class', 'node-rect')
            .attr('x', x - 32).attr('y', y - 32)
            .attr('width', 64).attr('height', 56).attr('rx', 10);

          // 时间 pill
          grp.append('rect').attr('class', 'node-pill')
            .attr('x', x - 16).attr('y', y - 26)
            .attr('width', 32).attr('height', 14).attr('rx', 4)
            .attr('fill', 'var(--bg)');
          grp.append('text').attr('class', 'node-pill-text')
            .attr('x', x).attr('y', y - 16).text(node.time_label);

          // 图标或圆圈
          if (isOpen) {
            grp.append('circle').attr('cx', x).attr('cy', y - 2).attr('r', 10)
              .attr('fill', 'none').attr('stroke', route.color).attr('stroke-width', 2);
            grp.append('text').attr('class', 'node-icon-text')
              .attr('x', x).attr('y', y - 1).text('?').attr('fill', route.color).attr('font-size', '14px');
          } else {
            grp.append('text').attr('class', 'node-icon-text')
              .attr('x', x).attr('y', y - 1).text(icon);
          }

          // 标题
          const shortTitle = node.title.length > 5 ? node.title.substring(0, 4) + '..' : node.title;
          grp.append('text').attr('class', 'node-title')
            .attr('x', x).attr('y', y + 18).text(shortTitle);

          // tooltip
          if (!isOpen) {
            grp.on('mouseenter', function(e) {
              const tip = document.getElementById('tip');
              tip.innerHTML = `<strong>${node.title}</strong>`;
              tip.style.left = (e.pageX + 10) + 'px';
              tip.style.top = (e.pageY - 30) + 'px';
              tip.style.opacity = 1;
            }).on('mouseleave', () => document.getElementById('tip').style.opacity = 0);
          }
        });

        // 终点标记
        const lastNode = route.nodes[route.nodes.length - 1];
        const lastPos = nodePositions[ri][route.nodes.length - 1];
        const lx = lastPos ? lastPos.x + 40 : sx + 4 * nsp + 38;
        const ly = lastPos ? lastPos.y : routeBaseY[ri];
        const markerG = g.append('g')
          .attr('class', 'ending-marker')
          .attr('transform', `translate(${lx}, ${ly + 12})`);
        markerG.append('circle')
          .attr('cx', 0).attr('cy', 0).attr('r', 11)
          .attr('fill', 'var(--bg)').attr('stroke', route.color).attr('stroke-width', 2);
        markerG.append('text')
          .attr('x', 0).attr('y', 1)
          .attr('text-anchor', 'middle')
          .attr('dominant-baseline', 'central')
          .attr('font-size', '13px')
          .attr('fill', route.color)
          .text(lastNode.title.includes('？') ? '?' : '◆');
      });
    }

    function showDetail(route, node) {
      const overlay = document.getElementById('detail-overlay');
      const popup = document.getElementById('detail-popup');
      const body = document.getElementById('detail-body');
      const isOpen = node.income === null;

      let metricsHtml = '';
      if (!isOpen) {
        const incomeColor = node.income >= 0 ? '#3fb950' : '#f85149';
        const emotionColor = node.emotion >= 6 ? '#3fb950' : node.emotion >= 4 ? '#d29922' : '#f85149';
        const healthColor = node.health >= 6 ? '#3fb950' : node.health >= 4 ? '#d29922' : '#f85149';
        metricsHtml = `
          <div class="detail-metrics">
            <div class="metric">
              <div class="metric-label">月收入</div>
              <div class="metric-track"><div class="metric-fill" style="width:${Math.min(Math.abs(node.income)/1000, 100)}%; background:${incomeColor}"></div></div>
              <div class="metric-val" style="color:${incomeColor}">${node.income >= 0 ? '¥' + node.income.toLocaleString() : '-¥' + Math.abs(node.income).toLocaleString()}</div>
            </div>
            <div class="metric">
              <div class="metric-label">情绪</div>
              <div class="metric-track"><div class="metric-fill" style="width:${node.emotion * 10}%; background:${emotionColor}"></div></div>
              <div class="metric-val" style="color:${emotionColor}">${node.emotion}/10</div>
            </div>
            <div class="metric">
              <div class="metric-label">健康</div>
              <div class="metric-track"><div class="metric-fill" style="width:${node.health * 10}%; background:${healthColor}"></div></div>
              <div class="metric-val" style="color:${healthColor}">${node.health}/10</div>
            </div>
          </div>
        `;
      }

      body.innerHTML = `
        <div class="detail-tag" style="background:${route.color}18; color:${route.color}; border:1px solid ${route.color}40;">
          ${route.short_label}${route.is_real ? ' · 真实' : ''}
        </div>
        <h3>${node.title}</h3>
        <div class="detail-time">${node.time_label} 后 · ${route.label}</div>
        <div class="detail-desc">${node.description}</div>
        ${isOpen ? '<div class="detail-open">未来尚未书写<br>选择权在你手里</div>' : metricsHtml}
        <div class="detail-event" style="border-left:3px solid ${route.color}; padding-left:12px; border-radius:0 8px 8px 0;">
          <div class="detail-event-label">关键事件</div>
          <div class="detail-event-text">${node.key_event}</div>
        </div>
      `;

      overlay.classList.add('active');
      popup.classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detail-overlay').classList.remove('active');
      document.getElementById('detail-popup').classList.remove('active');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    function renderRadar() {
      const container = document.getElementById('radar-chart');
      const w = 380, h = 320;
      const r = Math.min(w, h) / 2 - 40;

      const svg = d3.select('#radar-chart').append('svg')
        .attr('width', w).attr('height', h);
      const g = svg.append('g').attr('transform', `translate(${w/2}, ${h/2 + 5})`);

      const dims = Object.keys(dimensionLabels);
      const slice = (Math.PI * 2) / dims.length;

      // 网格
      for (let i = 1; i <= 5; i++) {
        g.append('circle').attr('r', r * i / 5)
          .attr('fill', 'none').attr('stroke', 'var(--border)').attr('stroke-width', 1);
      }

      // 轴线
      dims.forEach((dim, i) => {
        const a = slice * i - Math.PI / 2;
        g.append('line')
          .attr('x1', 0).attr('y1', 0)
          .attr('x2', Math.cos(a) * r).attr('y2', Math.sin(a) * r)
          .attr('stroke', 'var(--border)');
        g.append('text')
          .attr('x', Math.cos(a) * (r + 18)).attr('y', Math.sin(a) * (r + 18))
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
          .attr('fill', 'var(--text-dim)').attr('font-size', '11px')
          .text(dimensionLabels[dim]);
      });

      // 路线
      routesData.forEach(route => {
        const vals = dims.map(dim => route.balance_sheet[dim]);
        const pts = vals.map((v, i) => {
          const a = slice * i - Math.PI / 2;
          return [Math.cos(a) * r * v / 10, Math.sin(a) * r * v / 10];
        });

        g.append('path')
          .attr('d', d3.line().curve(d3.curveLinearClosed).x(d => d[0]).y(d => d[1])(pts))
          .attr('fill', route.color).attr('fill-opacity', route.is_real ? 0.12 : 0.04)
          .attr('stroke', route.color).attr('stroke-width', route.is_real ? 2 : 1)
          .attr('stroke-opacity', route.is_real ? 1 : 0.4)
          .attr('stroke-dasharray', route.is_real ? '' : '3 3');

        pts.forEach(p => {
          g.append('circle').attr('cx', p[0]).attr('cy', p[1])
            .attr('r', route.is_real ? 3 : 2).attr('fill', route.color)
            .attr('stroke', 'var(--bg)').attr('stroke-width', 1);
        });
      });

      // 图例
      const leg = svg.append('g').attr('transform', `translate(${w - 90}, 15)`);
      routesData.forEach((route, i) => {
        leg.append('line').attr('x1', 0).attr('y1', i * 16).attr('x2', 12).attr('y2', i * 16)
          .attr('stroke', route.color).attr('stroke-width', route.is_real ? 2 : 1)
          .attr('stroke-dasharray', route.is_real ? '' : '2 2');
        leg.append('text').attr('x', 16).attr('y', i * 16 + 4)
          .attr('fill', route.color).attr('font-size', '9px')
          .text(route.short_label + (route.is_real ? '★' : ''));
      });
    }

    // ============================================================
    // 初始化
    // ============================================================
    function init() {
      resizeCanvas();
      window.addEventListener('resize', () => {
        resizeCanvas();
        if (currentScene === 3) renderMain();
      });
      drawBg();
      updateSoundButton();

      // 开场文案（直接显示，无动画）
      const tw = document.getElementById('typewriter');
      tw.innerHTML = '凌晨一点，第79个案子终于处理完了。<br>窗外城市的灯火像无数条平行线，每条线都是一个选择。<br>如果当初，选了另一条路呢？';
      document.getElementById('intro-btn-wrap').style.opacity = 1;
      document.getElementById('cursor').style.display = 'none';

      // 试玩关卡
      initCareerSelect();
      syncWindowState();
      restoreGameFromHash();
    }

    init();
  </script>
